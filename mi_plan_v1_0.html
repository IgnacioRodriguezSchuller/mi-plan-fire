// ---------- Projection engine ----------
// Returns monthly series with: month, age, portfolio, invested, growth
function project({ age, retireAge, capital, monthly, ret }) {
  const months = Math.max(0, Math.round((retireAge - age) * 12));
  const r = Math.pow(1 + ret / 100, 1 / 12) - 1;
  const series = [];
  let p = capital;
  let invested = capital;
  for (let i = 0; i <= months; i++) {
    series.push({
      month: i,
      age: age + i / 12,
      portfolio: p,
      invested,
      growth: p - invested,
    });
    p = p * (1 + r) + monthly;
    invested += monthly;
  }
  return series;
}

// Compute when capital reaches a target amount; returns {age, months} or null
function timeToGoal({ age, capital, monthly, ret, target }) {
  if (capital >= target) return { age, months: 0 };
  const r = Math.pow(1 + ret / 100, 1 / 12) - 1;
  let p = capital;
  for (let i = 1; i <= 12 * 80; i++) {
    p = p * (1 + r) + monthly;
    if (p >= target) return { age: age + i / 12, months: i };
  }
  return null;
}

// "How much do I need monthly to reach target by age X with capital and return?"
function monthlyForGoal({ age, targetAge, capital, ret, target }) {
  const n = Math.max(1, Math.round((targetAge - age) * 12));
  const r = Math.pow(1 + ret / 100, 1 / 12) - 1;
  // FV = capital*(1+r)^n + monthly * ((1+r)^n - 1)/r ⇒ solve for monthly
  const growth = Math.pow(1 + r, n);
  const futureCapital = capital * growth;
  const remaining = target - futureCapital;
  if (remaining <= 0) return 0;
  return remaining * r / (growth - 1);
}

// ---------- v2 utilities: dates, ids, segments ----------
const uid = () => Math.random().toString(36).slice(2, 9);

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function monthKeyFromDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function addMonthsKey(key, n) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, (m - 1) + n, 1);
  return monthKeyFromDate(d);
}

function compareKeys(a, b) {
  return a < b ? -1 : a > b ? 1 : 0;
}

function isKeyInSegment(key, seg) {
  if (!seg.from) return false;
  if (compareKeys(key, seg.from) < 0) return false;
  if (seg.to && compareKeys(key, seg.to) > 0) return false;
  return true;
}

function findActiveSegment(segs, key) {
  if (!segs || !segs.length) return null;
  // last matching wins, so user can layer overrides
  let match = null;
  for (const s of segs) if (isKeyInSegment(key, s)) match = s;
  return match;
}

function sumActiveSegments(segs, key) {
  if (!segs || !segs.length) return 0;
  return segs.reduce((sum, s) => isKeyInSegment(key, s) ? sum + (Number(s.amount) || 0) : sum, 0);
}

// ---------- tramo overlap detection / normalization ----------
// Two segments overlap if their [from, to] ranges intersect.
// Returns array of overlap ids: [id1, id2] pairs.
function detectSegmentOverlaps(segs) {
  if (!segs || segs.length < 2) return [];
  const list = [];
  const norm = segs.filter(s => s && s.from).map(s => ({ id: s.id, from: s.from, to: s.to || '9999-12' }));
  for (let i = 0; i < norm.length; i++) {
    for (let j = i + 1; j < norm.length; j++) {
      const a = norm[i], b = norm[j];
      if (a.from <= b.to && b.from <= a.to) {
        list.push([a.id, b.id]);
      }
    }
  }
  return list;
}

function segmentHasOverlap(segs, id) {
  return detectSegmentOverlaps(segs).some(([a, b]) => a === id || b === id);
}

// Sort segments by `from` ascending and auto-close trailing `to` dates to avoid
// overlap with the next segment's `from`. Returns a new array.
function normalizeSegments(segs) {
  if (!segs || !segs.length) return segs || [];
  const sorted = [...segs].filter(s => s && s.from).sort((a, b) => compareKeys(a.from, b.from));
  const out = [];
  for (let i = 0; i < sorted.length; i++) {
    const s = { ...sorted[i] };
    const next = sorted[i + 1];
    // If there's a next segment AND this one extends into or past it → cap to.
    if (next && (!s.to || compareKeys(s.to, next.from) >= 0)) {
      s.to = addMonthsKey(next.from, -1);
      // If the cap puts `to` before `from`, drop this segment (covered fully by next)
      if (compareKeys(s.to, s.from) < 0) continue;
    }
    out.push(s);
  }
  return out;
}



function readableMonth(key) {
  if (!key) return '—';
  const [y, m] = key.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('es-ES', { month: 'short', year: 'numeric' }).replace('.', '');
}

// ---------- v2 projection engine ----------
// Walks month-by-month, using income/bonus/saving segments + events.
// Returns series with: monthIndex, key, age, year, portfolio, aportado, growth, monthlyIncome, monthlyAporte
function projectV2(plan, profile, opts = {}) {
  const r = Math.pow(1 + (plan.annualReturn || 0) / 100, 1 / 12) - 1;
  const includeHypothetical = opts.includeHypothetical !== false;
  const flatMonthly = opts.flatMonthly; // if number, override saving segments
  const startKey = opts.startKey || todayKey();
  const startCapital = opts.capital != null ? opts.capital : (plan.capital || 0);
  // Optional: weighted return for the legacy (starting) capital. When set, the
  // engine tracks two sub-portfolios: the starting capital compounds at this
  // rate (reflects "what your money is doing right now") while future
  // contributions compound at the plan's annualReturn (the target return for
  // money you intentionally invest from now on). When undefined or equal to
  // the plan rate, behaviour is identical to v4.
  const useSplit = opts.effectiveReturn != null && opts.effectiveReturn !== plan.annualReturn;
  const rLegacy = useSplit
    ? Math.pow(1 + opts.effectiveReturn / 100, 1 / 12) - 1
    : r;
  // Optional: explicit number of months to project (overrides the default age→retireAge span).
  // Useful when projecting from a past date so the curve reaches retireAge.
  let months;
  if (opts.months != null) {
    months = Math.max(0, Math.round(opts.months));
  } else if (opts.endAge != null) {
    const [sy, sm] = startKey.split('-').map(Number);
    const [ty, tm] = todayKey().split('-').map(Number);
    const monthsFromStartToToday = (ty - sy) * 12 + (tm - sm);
    const startAge = profile.age - monthsFromStartToToday / 12;
    months = Math.max(0, Math.round((opts.endAge - startAge) * 12));
  } else {
    months = Math.max(0, Math.round((profile.retireAge - profile.age) * 12));
  }
  // Optional: when projecting historical reality, real contributions override
  // segment-based aporte for each matching month key.
  const actualByKey = opts.actualByKey || null;
  // Reference age for the start of the series — used to compute `age` per row
  // when projecting from a past date. Defaults to profile.age (today).
  let startAge;
  if (opts.startAge != null) {
    startAge = opts.startAge;
  } else {
    const [sy, sm] = startKey.split('-').map(Number);
    const [ty, tm] = todayKey().split('-').map(Number);
    const monthsFromStartToToday = (ty - sy) * 12 + (tm - sm);
    startAge = profile.age - monthsFromStartToToday / 12;
  }

  let p = startCapital;
  let aportado = startCapital;
  // Split-portfolio bookkeeping. Only used when useSplit is true.
  let legacyP = startCapital;
  let newP = 0;
  const series = [];

  // Precompute event lookup by key
  const eventsByKey = {};
  (plan.events || []).forEach(e => {
    if (!includeHypothetical && e.status === 'hipotetico') return;
    if (!eventsByKey[e.date]) eventsByKey[e.date] = 0;
    eventsByKey[e.date] += Number(e.amount) || 0;
  });

  for (let m = 0; m <= months; m++) {
    const key = addMonthsKey(startKey, m);
    const [yy, mm] = key.split('-').map(Number);

    const income = sumActiveSegments(plan.incomeSegments, key);
    const bonus = sumActiveSegments(plan.bonusSegments, key);
    const totalIncome = income + bonus;

    let aporte = 0;
    // Real contribution override takes precedence — used for historical reconstruction.
    const hasActual = actualByKey && Object.prototype.hasOwnProperty.call(actualByKey, key)
      && actualByKey[key] != null;
    if (hasActual) {
      aporte = Number(actualByKey[key]) || 0;
    } else if (flatMonthly != null) {
      aporte = flatMonthly;
    } else {
      const seg = findActiveSegment(plan.savingSegments, key);
      if (seg) {
        if (seg.type === 'percent') aporte = totalIncome * ((Number(seg.value) || 0) / 100);
        else aporte = Number(seg.value) || 0;
      }
    }
    // extraMonthly is added on top, regardless of segment logic
    if (opts.extraMonthly && m > 0) aporte += opts.extraMonthly;

    const eventTotal = eventsByKey[key] || 0;

    // For m=0 we record initial state without adding new contributions
    if (m > 0) {
      if (useSplit) {
        legacyP = legacyP * (1 + rLegacy);
        newP = newP * (1 + r) + aporte + eventTotal;
        p = legacyP + newP;
      } else {
        p = p * (1 + r) + aporte + eventTotal;
      }
      aportado += aporte + eventTotal;
    }

    series.push({
      monthIndex: m,
      key,
      year: yy,
      monthOfYear: mm,
      age: startAge + m / 12,
      portfolio: p,
      aportado,
      growth: p - aportado,
      monthlyIncome: totalIncome,
      monthlyAporte: aporte + eventTotal,
      monthlyEvents: eventTotal,
      isHypotheticalRelevant: eventTotal > 0 && (plan.events || []).some(e => e.date === key && e.status === 'hipotetico'),
    });
  }
  return series;
}

// Currently active monthly aporte for a plan (used in many UI places)
// ----------------------------------------------------------------------------
// "Antes de Mi Plan" helpers — used in the mirror screen and to feed projectV2
// with a weighted return that reflects the user's actual capital allocation.
// All read-only: never mutate state.
// ----------------------------------------------------------------------------

// Sum of declared monthly expenses. 0 if not completed.
function sumExpenses(actualLife) {
  if (!actualLife || !actualLife.expenses) return 0;
  const e = actualLife.expenses;
  return (e.housing || 0) + (e.food || 0) + (e.transport || 0)
       + (e.subscriptions || 0) + (e.other || 0);
}

// Total weight of the allocation buckets (in %). Used to validate sums to 100.
function sumAllocation(actualLife) {
  if (!actualLife || !actualLife.allocation) return 0;
  const a = actualLife.allocation;
  return (a.cash || 0) + (a.deposits || 0) + (a.fundsEtfs || 0)
       + (a.pensionPlan || 0) + (a.other || 0);
}

// Weighted average nominal return for the starting capital, based on where the
// user has declared their money lives today. Returns null when the mini-onboarding
// is not complete or when no allocation has been declared — callers should fall
// back to plan.annualReturn in that case.
function computeEffectiveCapitalReturn(plan) {
  const al = plan && plan.actualLife;
  if (!al || !al.completed) return null;
  const a = al.allocation || {};
  const cr = a.customReturns || {};
  const planReturn = plan.annualReturn || 0;
  const returns = {
    cash: 0,
    deposits: cr.deposits != null ? cr.deposits : 2.0,
    fundsEtfs: cr.fundsEtfs != null ? cr.fundsEtfs : planReturn,
    pensionPlan: cr.pensionPlan != null ? cr.pensionPlan : planReturn,
    other: cr.other != null ? cr.other : 0,
  };
  const weights = {
    cash: a.cash || 0, deposits: a.deposits || 0, fundsEtfs: a.fundsEtfs || 0,
    pensionPlan: a.pensionPlan || 0, other: a.other || 0,
  };
  const totalW = weights.cash + weights.deposits + weights.fundsEtfs
               + weights.pensionPlan + weights.other;
  if (totalW <= 0) return null;
  const numerator = returns.cash * weights.cash
                  + returns.deposits * weights.deposits
                  + returns.fundsEtfs * weights.fundsEtfs
                  + returns.pensionPlan * weights.pensionPlan
                  + returns.other * weights.other;
  return numerator / totalW;
}

// French-amortisation schedule for a fixed-rate mortgage. Returns one row per
// year with principal paid, interest paid, and remaining balance. Used by the
// "coste oculto" chart. For variable mortgages the caller passes the resolved
// rate (euribor + spread).
function buildMortgageSchedule(mortgage) {
  if (!mortgage || !mortgage.enabled) return [];
  const principal = Number(mortgage.originalAmount) || 0;
  const years = Math.max(1, Math.round(Number(mortgage.termYears) || 30));
  const startYear = Number(mortgage.startYear) || new Date().getFullYear();
  const rate = mortgage.type === 'variable'
    ? ((Number(mortgage.euriborRef) || 0) + (Number(mortgage.spread) || 0)) / 100
    : (Number(mortgage.fixedRate) || 0) / 100;
  if (principal <= 0 || rate < 0) return [];
  const n = years * 12;
  const rM = rate / 12;
  // French formula: cuota = P · r / (1 - (1+r)^-n)
  const monthlyPayment = rM === 0 ? principal / n
    : principal * rM / (1 - Math.pow(1 + rM, -n));
  let balance = principal;
  const rows = [];
  for (let y = 0; y < years; y++) {
    let principalThisYear = 0;
    let interestThisYear = 0;
    for (let mo = 0; mo < 12; mo++) {
      const interest = balance * rM;
      const principalPart = Math.max(0, monthlyPayment - interest);
      interestThisYear += interest;
      principalThisYear += principalPart;
      balance = Math.max(0, balance - principalPart);
    }
    rows.push({
      year: startYear + y,
      principal: principalThisYear,
      interest: interestThisYear,
      balance,
    });
  }
  return rows;
}

function currentMonthlyAporte(plan) {
  return computePlannedFor(plan, todayKey());
}

// Compute the planned aporte for ANY specific month (based on tramos at that date)
function computePlannedFor(plan, key) {
  const seg = findActiveSegment(plan.savingSegments, key);
  if (!seg) return 0;
  if (seg.type === 'percent') {
    const income = sumActiveSegments(plan.incomeSegments, key);
    const bonus = sumActiveSegments(plan.bonusSegments, key);
    return Math.round((income + bonus) * (Number(seg.value) || 0) / 100);
  }
  return Number(seg.value) || 0;
}

// Compute the income (salary + complements) for a given month
function computeIncomeFor(plan, key) {
  return sumActiveSegments(plan.incomeSegments, key) + sumActiveSegments(plan.bonusSegments, key);
}

function currentMonthlyIncome(plan) {
  const key = todayKey();
  return sumActiveSegments(plan.incomeSegments, key) + sumActiveSegments(plan.bonusSegments, key);
}

// Convert a future nominal value to today's purchasing power.
// monthsFromNow: months between today and the value's date.
function toRealEur(nominalValue, monthsFromNow, inflationRate) {
  const rate = (inflationRate != null ? inflationRate : 2.5) / 100;
  const years = (monthsFromNow || 0) / 12;
  return nominalValue / Math.pow(1 + rate, years);
}

// ============================================================
// Decumulation engine — post-retirement portfolio drawdown.
// Bengen-style fixed-real: first-year withdrawal = `withdrawalRate%` of
// starting capital, then adjusted for inflation each subsequent year.
// Portfolio grows at `annualReturn` between draws.
//
// Research context (May 2026):
//  - Bengen (Aug 2025): historical SAFEMAX revised to 4.7% (1926-2024)
//  - Morningstar (2026): forward-looking 3.9% for 30-yr / 90% success
//  - Spanish FIRE community: 3.0-3.5% for 50+ year horizons
// ============================================================
function projectDecumulation(startCapital, plan, fromAge, toAge, opts = {}) {
  const annualReturn = plan.annualReturn || 0;
  const monthlyReturn = Math.pow(1 + annualReturn / 100, 1 / 12) - 1;
  const annualInflation = plan.inflationRate != null ? plan.inflationRate : 2.5;
  const monthlyInflation = Math.pow(1 + annualInflation / 100, 1 / 12) - 1;
  const withdrawalRatePct = opts.withdrawalRate != null
    ? opts.withdrawalRate
    : (plan.withdrawalRate != null ? plan.withdrawalRate : 4.0);

  const months = Math.max(0, Math.round((toAge - fromAge) * 12));
  const initialAnnualWithdrawal = startCapital * (withdrawalRatePct / 100);
  let capital = startCapital;
  let monthlyWithdrawal = initialAnnualWithdrawal / 12;
  const series = [];
  let depletedAtMonth = null;

  // Public pension (Spain by default): starts at pension.startAge, monthly amount
  // grows with inflation each month, and is added on top of portfolio withdrawal.
  const pen = plan.publicPension || null;
  const penEnabled = pen && pen.enabled && pen.monthlyAmount > 0;
  const penStartAge = penEnabled ? (pen.startAge || 67) : null;

  for (let m = 0; m <= months; m++) {
    const ageNow = fromAge + m / 12;
    // Pension contribution at this month (inflation-adjusted from start age)
    let pensionThisMonth = 0;
    if (penEnabled && ageNow >= penStartAge) {
      const monthsSincePension = (ageNow - penStartAge) * 12;
      pensionThisMonth = pen.monthlyAmount * Math.pow(1 + monthlyInflation, monthsSincePension);
    }
    series.push({
      monthIndex: m,
      portfolio: Math.max(0, capital),
      withdrawal: monthlyWithdrawal,
      pension: pensionThisMonth,
      totalIncome: monthlyWithdrawal + pensionThisMonth,
      annualWithdrawal: monthlyWithdrawal * 12,
      phase: 'decumulation',
    });
    if (capital <= 0) {
      if (depletedAtMonth === null) depletedAtMonth = m;
      capital = 0;
      monthlyWithdrawal = 0;
    } else if (m < months) {
      capital = capital * (1 + monthlyReturn) - monthlyWithdrawal;
      if (capital < 0) capital = 0;
      monthlyWithdrawal *= (1 + monthlyInflation);
    }
  }
  return { series, depletedAtMonth };
}

// ============================================================
// Spanish public pension estimator (May 2026 rules)
// Inputs:
//   - avgMonthlyContributionBase: estimate from user income (we use net as proxy)
//   - yearsContributed: years contributed at retirement
// Output: estimated monthly pension (in 14 pagas equivalence) + components
// References: BBVA Mi Jubilación, Caixabank, BOE
// ============================================================
function estimateSpanishPension({ avgMonthlyBase, yearsContributed, retireYear }) {
  // 2026 caps (€/month in 14 pagas equivalent)
  const PENSION_MAX_MONTHLY = 3359.60;        // 47.034,40 €/año / 14
  const PENSION_MIN_MONTHLY = 888.70;          // 12.441,80 €/año / 14, sin cónyuge

  // Base reguladora ≈ avgMonthlyBase (approximation; user's net monthly used as proxy
  // for the average cotization base. Real BR sums 25 years of bases / 350, but for a
  // forward-looking estimate this is reasonable enough.)
  const br = Math.max(0, avgMonthlyBase || 0);

  // Percentage based on years contributed (2026 scale)
  let pct = 0;
  if (yearsContributed >= 15) {
    if (yearsContributed >= 36.5) {
      pct = 1.0;
    } else {
      const monthsExtra = (yearsContributed - 15) * 12;
      if (monthsExtra <= 49) {
        pct = 0.50 + monthsExtra * 0.0021;
      } else {
        pct = 0.50 + 49 * 0.0021 + (monthsExtra - 49) * 0.0019;
      }
      pct = Math.min(pct, 1.0);
    }
  }

  // Raw pension
  let pension = br * pct;
  // Apply caps
  if (pension > PENSION_MAX_MONTHLY) pension = PENSION_MAX_MONTHLY;
  if (pct >= 0.50 && pension < PENSION_MIN_MONTHLY) pension = PENSION_MIN_MONTHLY;
  if (pct === 0) pension = 0; // No contributory pension below 15 years

  return {
    monthly14: pension,                   // 14 pagas (the official figure)
    monthly12Equivalent: pension * 14 / 12, // equivalent if you'd average over 12 pagas
    annual: pension * 14,
    percentage: pct,
    cappedMax: pension === PENSION_MAX_MONTHLY,
    cappedMin: pct >= 0.50 && br * pct < PENSION_MIN_MONTHLY,
  };
}

// ============================================================
// Historical compound: compute current portfolio properly,
// applying monthly returns to past aportes instead of just summing them.
// ============================================================
function computeCurrentPortfolio(plan, months, opts = {}) {
  const today = todayKey();
  const r = Math.pow(1 + (plan.annualReturn || 0) / 100, 1 / 12) - 1;
  // Optional split-portfolio bookkeeping. Mirrors projectV2's behaviour: the
  // starting capital compounds at effectiveReturn (where money lives today),
  // while past contributions compound at the plan return (deliberate inv.).
  const useSplit = opts.effectiveReturn != null && opts.effectiveReturn !== plan.annualReturn;
  const rLegacy = useSplit
    ? Math.pow(1 + opts.effectiveReturn / 100, 1 / 12) - 1
    : r;
  // Sort months chronologically
  const sorted = [...(months || [])].sort((a, b) => compareKeys(a.key, b.key));
  // Filter to those with a registered actual (otherwise no contribution to compounding)
  const registered = sorted.filter(m => m.actual != null);
  if (registered.length === 0) return plan.capital || 0;
  // Apply monthly growth + aporte from the EARLIEST registered month up to today.
  // For the initial capital, we compound from the first registered month onwards.
  const firstKey = registered[0].key;
  // Months between firstKey and today (inclusive on first, exclusive on today)
  const [fy, fm] = firstKey.split('-').map(Number);
  const [ty, tm] = today.split('-').map(Number);
  const totalMonths = (ty - fy) * 12 + (tm - fm);
  // Map registered actuals by key
  const actualByKey = new Map(registered.map(m => [m.key, m.actual]));
  let legacy = plan.capital || 0;
  let newP = 0;
  let p = plan.capital || 0;
  for (let i = 0; i <= totalMonths; i++) {
    const dt = new Date(fy, (fm - 1) + i, 1);
    const key = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0');
    if (i > 0) {
      if (useSplit) {
        legacy = legacy * (1 + rLegacy);
        newP = newP * (1 + r);
        p = legacy + newP;
      } else {
        p = p * (1 + r);
      }
    }
    if (actualByKey.has(key)) {
      const aporte = actualByKey.get(key) || 0;
      if (useSplit) { newP += aporte; p = legacy + newP; }
      else { p += aporte; }
    }
  }
  return p;
}

// ============================================================
// Monte Carlo simulation — sequence of returns risk
//
// Methodology (researched May 2026):
//  - S&P 500 historical: μ ≈ 9.35% nominal, σ ≈ 15% (sometimes 18% conservative)
//  - Bonds: μ ≈ 4.5%, σ ≈ 5%
//  - We infer σ from the user's annualReturn: aggressive returns imply higher σ
//  - Apply box-muller transform for normal-distributed annual returns
//  - Run 500 simulations at annual resolution (compromise of speed vs precision)
//  - Report p10/p50/p90 portfolio paths + success rate
// ============================================================

// Box-Muller transform: turn two uniform U(0,1) into a standard normal N(0,1)
function randomNormal() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

// Infer annual standard deviation from expected return.
// Mapping based on typical asset-class observations:
//   2-3%  return → 1-2% σ (cash / short-term bonds)
//   4-5%  return → 5-7% σ (bonds)
//   6-7%  return → 10-12% σ (balanced)
//   8-10% return → 14-17% σ (equity-heavy)
//   11-15% return → 18-22% σ (aggressive)
function inferVolatility(annualReturnPct) {
  const r = annualReturnPct || 0;
  if (r <= 2) return 1.5;
  if (r <= 4) return 5;
  if (r <= 6) return 10;
  if (r <= 8) return 13;
  if (r <= 10) return 16;
  if (r <= 12) return 18;
  return 20;
}

// Quick percentile of a sorted array
function percentile(sortedArr, p) {
  if (!sortedArr.length) return 0;
  const idx = Math.min(sortedArr.length - 1, Math.floor(p / 100 * sortedArr.length));
  return sortedArr[idx];
}

// Run Monte Carlo on the accumulation + decumulation cycle.
// Returns: { paths (sample), percentiles { p10, p25, p50, p75, p90 } per year,
//           successRate, depletionYears, depletionAgeStats, ... }
// `opts.sequenceMode`: 'random' (default), 'early-crash', or 'late-crash'.
// In early/late modes, each trial generates its returns randomly first, then
// the 5 worst years are *placed* at the start of decumulation (early-crash) or
// at the very end of the plan (late-crash). The rest of the years carry the
// remaining returns in random order. This isolates the sequence-of-returns risk.
function runMonteCarlo(plan, profile, opts = {}) {
  const trials = opts.trials || 500;
  const startCapital = opts.startCapital != null ? opts.startCapital : (plan.capital || 0);
  const fromAge = profile.age;
  const retireAge = profile.retireAge;
  const lifeExp = plan.lifeExpectancy || 90;
  const yearsTotal = lifeExp - fromAge;
  if (yearsTotal <= 0) return { paths: [], percentiles: [], successRate: 1, yearsTotal: 0, depletionYears: [], depletionAgeStats: null };

  const annualReturn = plan.annualReturn || 0;
  const sigma = (opts.volatility != null ? opts.volatility : inferVolatility(annualReturn)) / 100;
  const mu = annualReturn / 100;
  // Use log-normal returns: each year return = exp(N(μ - σ²/2, σ))
  // This keeps the mean simple-return correct
  const muLog = Math.log(1 + mu) - 0.5 * sigma * sigma;

  // Current monthly aporte (assumed constant for MC simplicity — annual aggregated)
  const monthlyAporte = currentMonthlyAporte(plan) || 0;
  const annualAporte = monthlyAporte * 12;

  // Withdrawal during decumulation
  const withdrawalRate = (plan.withdrawalRate != null ? plan.withdrawalRate : 4.0) / 100;
  const inflationRate = (plan.inflationRate != null ? plan.inflationRate : 2.5) / 100;

  // Pension (annual)
  const pen = plan.publicPension || { enabled: false };
  const penEnabled = pen.enabled && (pen.monthlyAmount || 0) > 0;
  const penAnnual = penEnabled ? pen.monthlyAmount * 14 : 0; // 14 pagas
  const penStartAge = penEnabled ? (pen.startAge || 67) : null;

  // Pre-allocate arrays for performance: paths[trial][year] = portfolio
  // For memory efficiency, only keep p10/p50/p90 per year
  const valuesPerYear = Array.from({ length: yearsTotal + 1 }, () => []);
  let successful = 0;
  // Store a small sample (5 paths) for visualization
  const sampleSize = Math.min(5, trials);
  const samples = [];

  const yearsAccum = retireAge - fromAge;
  const yearsDecum = lifeExp - retireAge;
  const initialAnnualWithdrawal = startCapital; // placeholder, computed per trial

  // Sequence-of-returns config
  const sequenceMode = opts.sequenceMode || 'random';
  const crashWindow = Math.min(5, yearsTotal);
  const depletionYears = [];

  // Build the ordered list of returns for one trial, applying the sequence mode.
  const buildYearReturns = () => {
    const all = new Array(yearsTotal);
    for (let i = 0; i < yearsTotal; i++) {
      all[i] = Math.exp(muLog + sigma * randomNormal()) - 1;
    }
    if (sequenceMode === 'random' || yearsTotal <= crashWindow) return all;

    const sortedAsc = [...all].sort((a, b) => a - b);
    const worst = sortedAsc.slice(0, crashWindow);
    const rest = sortedAsc.slice(crashWindow);
    // Fisher–Yates shuffle on the "rest" so non-crash positions stay random
    for (let i = rest.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rest[i], rest[j]] = [rest[j], rest[i]];
    }
    const out = new Array(yearsTotal);
    let placeStart;
    if (sequenceMode === 'early-crash') {
      // Anchor the worst window to the first year of decumulation
      placeStart = Math.max(0, Math.min(yearsAccum, yearsTotal - crashWindow));
    } else {
      // late-crash: anchor at the very end
      placeStart = yearsTotal - crashWindow;
    }
    for (let i = 0; i < crashWindow; i++) out[placeStart + i] = worst[i];
    let ri = 0;
    for (let y = 0; y < yearsTotal; y++) {
      if (y >= placeStart && y < placeStart + crashWindow) continue;
      out[y] = rest[ri++];
    }
    return out;
  };

  for (let t = 0; t < trials; t++) {
    let portfolio = startCapital;
    let firstYearWithdrawal = null;
    let currentWithdrawal = 0;
    const path = [portfolio];
    let depleted = false;
    let depletionYear = null;

    const yearReturns = buildYearReturns();

    for (let y = 0; y < yearsTotal; y++) {
      const yearReturn = yearReturns[y];

      const isAccum = y < yearsAccum;
      if (isAccum) {
        // Accumulation: grow + contribute
        portfolio = portfolio * (1 + yearReturn) + annualAporte;
      } else {
        // Decumulation: lock in first-year withdrawal at retirement value
        if (firstYearWithdrawal === null) {
          firstYearWithdrawal = portfolio * withdrawalRate;
          currentWithdrawal = firstYearWithdrawal;
        }
        // Pension contribution this year (real, but we keep nominal-equivalent for simplicity)
        const ageNow = retireAge + (y - yearsAccum);
        let pensionThisYear = 0;
        if (penEnabled && ageNow >= penStartAge) {
          const yearsSincePen = ageNow - penStartAge;
          pensionThisYear = penAnnual * Math.pow(1 + inflationRate, yearsSincePen);
        }
        // Withdrawal needed FROM PORTFOLIO = total need - pension (if covered)
        // But Bengen rule prescribes fixed real withdrawal regardless of pension.
        // Honest approach: withdrawal from portfolio reduced by pension (net spending stays same).
        const portfolioWithdrawal = Math.max(0, currentWithdrawal - pensionThisYear);
        // Grow first, then withdraw
        portfolio = portfolio * (1 + yearReturn) - portfolioWithdrawal;
        if (portfolio < 0) {
          portfolio = 0;
          if (!depleted) {
            depleted = true;
            depletionYear = y;
          }
        }
        // Inflate next year's withdrawal target
        currentWithdrawal *= (1 + inflationRate);
      }
      path.push(portfolio);
    }
    // Success = ended decumulation with portfolio > 0 (or with pension covering everything)
    const finalPortfolio = path[path.length - 1];
    if (!depleted || finalPortfolio > 0) successful++;
    if (depleted) depletionYears.push(depletionYear);

    // Save path values to per-year arrays
    for (let y = 0; y < path.length; y++) {
      valuesPerYear[y].push(path[y]);
    }
    // Save first samples for visualization
    if (samples.length < sampleSize) samples.push(path);
  }

  // Compute percentiles per year
  const percentiles = valuesPerYear.map((vals) => {
    const sorted = [...vals].sort((a, b) => a - b);
    return {
      p10: percentile(sorted, 10),
      p25: percentile(sorted, 25),
      p50: percentile(sorted, 50),
      p75: percentile(sorted, 75),
      p90: percentile(sorted, 90),
    };
  });

  // Depletion-age stats: the age at which the failing scenarios run out.
  let depletionAgeStats = null;
  if (depletionYears.length > 0) {
    const sortedDep = [...depletionYears].sort((a, b) => a - b);
    depletionAgeStats = {
      median: Math.round(percentile(sortedDep, 50) + fromAge),
      p25:    Math.round(percentile(sortedDep, 25) + fromAge),
      p75:    Math.round(percentile(sortedDep, 75) + fromAge),
      count:  depletionYears.length,
    };
  }

  return {
    paths: samples,
    percentiles,
    successRate: successful / trials,
    yearsTotal,
    yearsAccum,
    trials,
    sigma: sigma * 100,
    sequenceMode,
    depletionYears,
    depletionAgeStats,
  };
}

// ---------- v2 migration ----------
function migrateToV2(state) {
  if (!state) return state;
  // v5.8 · Pre-onboarding flag upsert at root level (idempotent).
  // Existing users who finished onboarding skip the new landing; users with
  // partial state see it. New empty states default to false from emptyState().
  if (state.hasSeenLandingPreOnboarding == null) {
    state.hasSeenLandingPreOnboarding = !!state.onboardingComplete;
  }
  // v5.10 · free/pro flag. Default false for everyone; users opt-in via the
  // testing toggle in Ajustes. No paywall yet — just a feature gate.
  if (state.isPro == null) state.isPro = false;
  // Backfill new fields for any state shape (cheap upserts, idempotent)
  if (state.plan) {
    if (state.plan.inflationRate == null) state.plan.inflationRate = 2.5;
    if (state.plan.withdrawalRate == null) state.plan.withdrawalRate = 4.0;
    if (state.plan.lifeExpectancy == null) state.plan.lifeExpectancy = 90;
    if (state.plan.publicPension == null) {
      state.plan.publicPension = {
        enabled: false, startAge: 67, monthlyAmount: 0, yearsContributed: 0, autoEstimate: true,
      };
    }
    // v5 · "Antes de Mi Plan" — declared expenses, mortgage, capital allocation.
    // Idempotent: only initialise when missing, never overwrite user data.
    if (state.plan.actualLife == null) {
      state.plan.actualLife = {
        completed: false,
        expenses: { housing: 0, food: 0, transport: 0, subscriptions: 0, other: 0 },
        mortgage: {
          enabled: false, originalAmount: 0, termYears: 30, startYear: new Date().getFullYear(),
          type: 'fixed', fixedRate: 3.0, spread: 1.0, euriborRef: 3.0,
        },
        allocation: {
          cash: 0, deposits: 0, fundsEtfs: 0, pensionPlan: 0, other: 0,
          customReturns: { deposits: 2.0, fundsEtfs: null, pensionPlan: null, other: 0 },
        },
      };
    }
  }
  if (state.displayMode == null) state.displayMode = 'nominal';
  if (state.schemaVersion === 2) return state;
  const plan = state.plan || {};
  const tk = todayKey();
  const updated = {
    ...state,
    schemaVersion: 2,
    landingSeen: state.landingSeen != null ? state.landingSeen : true,
    // v5.8 · Pre-onboarding landing flag. Existing users who already completed
    // onboarding don't see the new pre-landing; new users (or users who
    // reset state) do.
    hasSeenLandingPreOnboarding: state.hasSeenLandingPreOnboarding != null
      ? state.hasSeenLandingPreOnboarding
      : !!state.onboardingComplete,
    plan: {
      capital: plan.capital || 0,
      annualReturn: plan.annualReturn || 8,
      incomeSegments: plan.incomeSegments || [],
      bonusSegments: plan.bonusSegments || [],
      savingSegments: plan.savingSegments || [],
      events: plan.events || [],
      // keep monthlyPlanned around for older mes-a-mes screen if needed
      monthlyPlanned: plan.monthlyPlanned != null ? plan.monthlyPlanned : 0,
    },
    sandbox: state.sandbox || null,
  };
  // If we have monthlyPlanned but no saving segments yet, materialise one open tramo
  if ((!plan.savingSegments || plan.savingSegments.length === 0) && (plan.monthlyPlanned || 0) > 0) {
    updated.plan.savingSegments = [{
      id: uid(),
      from: tk,
      to: null,
      type: 'fixed',
      value: plan.monthlyPlanned,
      label: 'Aporte mensual',
    }];
  }
  return updated;
}


// ---------- Storage ----------
const STORAGE_KEY = 'miplan.state.v1';          // legacy single-state key (read for migration)
const ACCOUNTS_KEY = 'miplan.accounts.v1';      // new multi-account container

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return migrateToV2(JSON.parse(raw));
  } catch (e) {}
  return null;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

// Multi-account container
function loadAccountsData() {
  // Try new storage first
  try {
    const raw = localStorage.getItem(ACCOUNTS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Re-run migrateToV2 on each account state (safety against old payloads)
      Object.keys(parsed.accounts || {}).forEach((id) => {
        if (parsed.accounts[id] && parsed.accounts[id].state) {
          parsed.accounts[id].state = migrateToV2(parsed.accounts[id].state);
        }
      });
      return parsed;
    }
  } catch (e) {}
  // Fall back: migrate from legacy single state
  const legacy = loadState();
  if (legacy) {
    return {
      version: 1,
      activeId: 'default',
      accounts: {
        'default': {
          id: 'default',
          label: (legacy.profile && legacy.profile.name) || 'Mi cuenta',
          state: legacy,
        },
      },
    };
  }
  return null;
}

function saveAccountsData(data) {
  try { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(data)); } catch (e) {}
}

function initialAccountsData() {
  return {
    version: 1,
    activeId: 'default',
    accounts: {
      'default': {
        id: 'default',
        label: 'Mi cuenta',
        state: emptyState(),
      },

  };
}

// ---------- Context ----------
const StateCtx = createContext(null);

function StateProvider({ children }) {
  const [accountsData, setAccountsData] = useState(() => loadAccountsData() || initialAccountsData());
  useEffect(() => { saveAccountsData(accountsData); }, [accountsData]);

  // The "current" state is the active account's state
  const state = accountsData.accounts[accountsData.activeId]?.state || emptyState();

  // setState writes into the active account
  const setState = useCallback((updater) => {
    setAccountsData((d) => {
      const cur = d.accounts[d.activeId];
      if (!cur) return d;
      const newState = typeof updater === 'function' ? updater(cur.state) : updater;
      return {
        ...d,
        accounts: { ...d.accounts, [d.activeId]: { ...cur, state: newState } },
      };
    });
  }, []);

  // Account management
  const switchAccount = useCallback((id) => setAccountsData((d) => d.accounts[id] ? { ...d, activeId: id } : d), []);
  const createAccount = useCallback((label) => {
    const id = 'a' + Date.now() + Math.floor(Math.random() * 1000);
    setAccountsData((d) => ({
      ...d,
      accounts: {
        ...d.accounts,
        [id]: {
          id,
          label: label || 'Nueva persona',
          // New accounts skip landing (the user already knows the app)
          state: { ...emptyState(), landingSeen: true },
        },
      },
      activeId: id,
    }));
    return id;
  }, []);
  const renameAccount = useCallback((id, label) => setAccountsData((d) => {
    if (!d.accounts[id]) return d;
    return { ...d, accounts: { ...d.accounts, [id]: { ...d.accounts[id], label } } };
  }), []);
  const deleteAccount = useCallback((id) => setAccountsData((d) => {
    if (!d.accounts[id] || Object.keys(d.accounts).length <= 1) return d;
    const rest = { ...d.accounts };
    delete rest[id];
    const newActive = d.activeId === id ? Object.keys(rest)[0] : d.activeId;
    return { ...d, accounts: rest, activeId: newActive };
  }), []);

  // Helpers
  const update = useCallback((patch) => {
    setState((s) => (typeof patch === 'function' ? patch(s) : { ...s, ...patch }));
  }, []);
  const updateProfile = useCallback((p) => setState((s) => ({ ...s, profile: { ...s.profile, ...p } })), []);

  // updatePlan now writes to sandbox if active, otherwise to real plan
  const updatePlan = useCallback((p) => setState((s) => {
    if (s.sandbox) return { ...s, sandbox: { ...s.sandbox, ...p } };
    return { ...s, plan: { ...s.plan, ...p } };
  }), []);

  // Direct mutators on the active plan (sandbox-aware)
  const mutatePlan = useCallback((fn) => setState((s) => {
    if (s.sandbox) return { ...s, sandbox: fn({ ...s.sandbox }) };
    return { ...s, plan: fn({ ...s.plan }) };
  }), []);

  // Sandbox controls
  const startSandbox = useCallback(() => setState((s) => {
    if (s.sandbox) return s;
    return { ...s, sandbox: JSON.parse(JSON.stringify(s.plan)) };
  }), []);
  const discardSandbox = useCallback(() => setState((s) => ({ ...s, sandbox: null })), []);
  const applySandbox = useCallback(() => setState((s) => {
    if (!s.sandbox) return s;
    return { ...s, plan: s.sandbox, sandbox: null };
  }), []);

  const setMonth = useCallback((key, patch) => setState((s) => ({
    ...s,
    months: s.months.map((m) => m.key === key ? { ...m, ...patch } : m),
  })), []);
  const addGoal = useCallback((goal) => setState((s) => ({
    ...s, goals: [...s.goals, { ...goal, id: 'g' + Date.now() }],
  })), []);
  const updateGoal = useCallback((id, patch) => setState((s) => ({
    ...s, goals: s.goals.map((g) => g.id === id ? { ...g, ...patch } : g),
  })), []);
  const removeGoal = useCallback((id) => setState((s) => ({
    ...s, goals: s.goals.filter((g) => g.id !== id),
  })), []);
  // Modal-driven reset (no native confirm — blocked in iframes)
  const [pendingConfirm, setPendingConfirm] = useState(null);
  const resetAll = useCallback(() => {
    setPendingConfirm({
      title: '¿Borrar esta cuenta?',
      body: 'Se borrarán los tramos, eventos, meses y metas de la cuenta activa. Las otras cuentas no se tocan. Esto no se puede deshacer.',
      confirmLabel: 'Sí, borrar',
      destructive: true,
      action: () => {
        setState(emptyState());
      },
    });
  }, []);
  const reonboard = useCallback(() => {
    setPendingConfirm({
      title: '¿Volver al onboarding?',
      body: 'Te llevaremos al onboarding manteniendo tus datos actuales por si quieres conservarlos. Si lo terminas, se sobrescriben.',
      confirmLabel: 'Sí, ir al onboarding',
      action: () => {
        setState((s) => ({ ...s, onboardingComplete: false }));
      },
    });
  }, []);
  const seedDemo = useCallback(() => setState(seedState()), []);

  const value = useMemo(() => ({
    state, update, updateProfile, updatePlan, mutatePlan,
    startSandbox, discardSandbox, applySandbox,
    setMonth, addGoal, updateGoal, removeGoal, resetAll, reonboard, seedDemo,
    activePlan: state.sandbox || state.plan,
    sandboxActive: !!state.sandbox,
    // Account API
    accounts: accountsData.accounts,
    activeAccountId: accountsData.activeId,
    switchAccount, createAccount, renameAccount, deleteAccount,
  }), [accountsData, state]);

  return (
    <StateCtx.Provider value={value}>
      {children}
      <ConfirmModal
        open={!!pendingConfirm}
        title={pendingConfirm?.title}
        body={pendingConfirm?.body}
        confirmLabel={pendingConfirm?.confirmLabel}
        destructive={pendingConfirm?.destructive}
        onConfirm={() => { pendingConfirm?.action?.(); setPendingConfirm(null); }}
        onCancel={() => setPendingConfirm(null)}
      />
    </StateCtx.Provider>
  );
}

const useStore = () => useContext(StateCtx);

function useIsMobile() {
  const [mobile, setMobile] = useState(typeof window !== "undefined" && window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mobile;
}

// ---------- Derived selectors ----------
function useDerived() {
  const { state, activePlan, sandboxActive } = useStore();
  return useMemo(() => {
    const { profile, plan, months } = state;
    const filledMonths = (months || []).filter(m => m.actual != null);
    const totalActual = filledMonths.reduce((s, m) => s + (m.actual || 0), 0);
    // Recompute planned from current tramos so a plan update in Ajustes propagates here.
    // Using the stored `m.planned` snapshot would leave stale numbers and trigger
    // false "behind plan" messages when the user has raised contributions retroactively.
    const totalPlannedSoFar = filledMonths.reduce((s, m) => s + computePlannedFor(plan, m.key), 0);
    // Effective return on the starting capital: weighted average of the user's
    // declared capital allocation (null when actualLife is not completed).
    const effectiveReturn = computeEffectiveCapitalReturn(plan);
    const sandboxEffReturn = sandboxActive ? computeEffectiveCapitalReturn(state.sandbox) : null;
    // Historical compound: properly grow past aportes from their month to today
    const currentPortfolio = computeCurrentPortfolio(plan, months || [], { effectiveReturn });
    const sandboxCurrentPortfolio = sandboxActive
      ? computeCurrentPortfolio(state.sandbox, months || [], { effectiveReturn: sandboxEffReturn })
      : currentPortfolio;
    const baseMonthly = currentMonthlyAporte(plan) || plan.monthlyPlanned || 0;
    const avgActual = filledMonths.length ? totalActual / filledMonths.length : baseMonthly;

    // Plan curve (using v2 engine on the *real* plan, starting from currentPortfolio).
    // effectiveReturn is forwarded so that starting capital that sits in low-yield
    // accounts grows realistically while new contributions still target the plan's rate.
    const seriesPlan = projectV2(plan, profile, {
      capital: currentPortfolio,
      includeHypothetical: false,
      effectiveReturn,
    });
    // Real pace: flat aporte at avgActual instead of segments
    const seriesActualPace = projectV2(plan, profile, {
      capital: currentPortfolio,
      flatMonthly: avgActual,
      includeHypothetical: false,
      effectiveReturn,
    });

    // ------------------------------------------------------------
    // Dual curves from start (for plan-vs-reality visualisation).
    // Both span from the first registered month to retireAge,
    // start at plan.capital, and use the same plan tramos for any
    // future month. They diverge wherever a registered month's
    // `actual` differs from what the plan would have prescribed.
    // ------------------------------------------------------------
    const sortedMonths = [...filledMonths].sort((a, b) => compareKeys(a.key, b.key));
    const firstRegisteredKey = sortedMonths.length ? sortedMonths[0].key : null;
    const lastRegisteredKey = sortedMonths.length ? sortedMonths[sortedMonths.length - 1].key : null;
    const actualByKey = {};
    sortedMonths.forEach((m) => { actualByKey[m.key] = m.actual; });

    const startKeyForHistory = firstRegisteredKey || todayKey();
    const seriesPlanFromStart = projectV2(plan, profile, {
      capital: plan.capital || 0,
      startKey: startKeyForHistory,
      endAge: profile.retireAge,
      includeHypothetical: false,
      effectiveReturn,
    });
    const seriesRealFromStart = projectV2(plan, profile, {
      capital: plan.capital || 0,
      startKey: startKeyForHistory,
      endAge: profile.retireAge,
      includeHypothetical: false,
      actualByKey,
      effectiveReturn,
    });

    // Portfolio at last registered month on each curve — basis for "ahead vs behind"
    const findAtKey = (s, k) => s.find((row) => row.key === k) || null;
    const planAtLastReg = lastRegisteredKey ? findAtKey(seriesPlanFromStart, lastRegisteredKey) : null;
    const realAtLastReg = lastRegisteredKey ? findAtKey(seriesRealFromStart, lastRegisteredKey) : null;
    const planPortfolioAtLastReg = planAtLastReg ? planAtLastReg.portfolio : null;
    const realPortfolioAtLastReg = realAtLastReg ? realAtLastReg.portfolio : null;
    const realVsPlanDelta = (planPortfolioAtLastReg != null && realPortfolioAtLastReg != null)
      ? realPortfolioAtLastReg - planPortfolioAtLastReg : null;
    const realVsPlanRatio = (planPortfolioAtLastReg != null && planPortfolioAtLastReg > 0 && realPortfolioAtLastReg != null)
      ? realPortfolioAtLastReg / planPortfolioAtLastReg : null;

    // FI target (same logic as FinancialHealthCard) — for age-at-FI comparisons.
    // When the user has declared expenses, use them directly. Otherwise fall back
    // to the income−investment derivation (legacy behaviour).
    const tkNow = todayKey();
    const monthlyIncomeNow = computeIncomeFor(plan, tkNow);
    const monthlyInvestmentNow = computePlannedFor(plan, tkNow);
    const alNow = plan.actualLife;
    const useDeclaredExpensesNow = !!(alNow && alNow.completed);
    const monthlyLifeNow = useDeclaredExpensesNow
      ? sumExpenses(alNow)
      : Math.max(0, monthlyIncomeNow - monthlyInvestmentNow);
    const penNow = plan.publicPension || { enabled: false };
    const pensionMonthlyNow = penNow.enabled ? (penNow.monthlyAmount || 0) : 0;
    const monthlyGapNow = Math.max(0, monthlyLifeNow - pensionMonthlyNow);
    const wdr = (plan.withdrawalRate != null ? plan.withdrawalRate : 4.0) / 100;
    const fiTarget = monthlyGapNow > 0 ? monthlyGapNow * 12 / wdr : 0;

    const ageHittingTarget = (s, target) => {
      if (target <= 0) return null;
      for (let i = 0; i < s.length; i++) {
        if ((s[i].portfolio || 0) >= target) return s[i].age;
      }
      return null;
    };
    const ageAtFiPlan = fiTarget > 0 ? ageHittingTarget(seriesPlanFromStart, fiTarget) : null;
    const ageAtFiReal = fiTarget > 0 ? ageHittingTarget(seriesRealFromStart, fiTarget) : null;
    // Sandbox curve (if active)
    const seriesSandbox = sandboxActive ? projectV2(state.sandbox, profile, {
      capital: sandboxCurrentPortfolio,
      includeHypothetical: true,
      effectiveReturn: sandboxEffReturn,
    }) : null;
    // Plan curve including hypothetical events (for "if all goes well" view)
    const seriesPlanWithHypo = projectV2(plan, profile, {
      capital: currentPortfolio,
      includeHypothetical: true,
      effectiveReturn,
    });

    const finalPlan = seriesPlan[seriesPlan.length - 1];
    const finalPace = seriesActualPace[seriesActualPace.length - 1];
    const finalPlanHypo = seriesPlanWithHypo[seriesPlanWithHypo.length - 1];
    const finalSandbox = seriesSandbox ? seriesSandbox[seriesSandbox.length - 1] : null;

    // Decumulation phase: continues from finalPlan portfolio at retire age
    const lifeExp = plan.lifeExpectancy || 90;
    const decumResult = projectDecumulation(
      finalPlan.portfolio,
      plan,
      profile.retireAge,
      lifeExp,
    );
    const seriesDecum = decumResult.series;
    const depletedAtMonth = decumResult.depletedAtMonth;
    // Age at which money runs out (null if it doesn't)
    const depletedAtAge = depletedAtMonth != null ? profile.retireAge + depletedAtMonth / 12 : null;
    // Initial monthly retirement income (year-1 withdrawal / 12)
    const retirementMonthlyIncome = seriesDecum.length > 0 ? seriesDecum[0].withdrawal : 0;
    // Final portfolio at life expectancy (legacy / bequest)
    const portfolioAtLifeEnd = seriesDecum.length > 0 ? seriesDecum[seriesDecum.length - 1].portfolio : 0;

    // Public pension info — what user gets monthly starting at pension start age (nominal, year-1)
    const pen = plan.publicPension || { enabled: false };
    const pensionMonthly = pen.enabled ? (pen.monthlyAmount || 0) : 0;
    // Monthly pension at retireAge (might start later, so adjust for inflation)
    // If pension starts AFTER retire age, it's 0 at retireAge and kicks in later
    const yearsUntilPension = pen.enabled ? Math.max(0, (pen.startAge || 67) - profile.retireAge) : 0;
    // Combined monthly income at retirement (year-1, before pension kicks in if later)
    const totalMonthlyAtRetire = retirementMonthlyIncome + (yearsUntilPension === 0 ? pensionMonthly : 0);

    return {
      currentPortfolio,
      filledMonths, totalActual, totalPlannedSoFar, avgActual,
      diffSoFar: totalActual - totalPlannedSoFar,
      currentAporte: baseMonthly,
      currentIncome: currentMonthlyIncome(plan),
      seriesPlan, seriesActualPace, seriesPlanWithHypo, seriesSandbox,
      finalPlan, finalPace, finalPlanHypo, finalSandbox,
      ahead: finalPace.portfolio > finalPlan.portfolio,
      // Decumulation outputs
      seriesDecum, depletedAtMonth, depletedAtAge,
      retirementMonthlyIncome, portfolioAtLifeEnd,
      // Pension outputs
      pensionMonthly, yearsUntilPension, totalMonthlyAtRetire,
      // Dual curves: plan original vs real reconstructed (from first registered month)
      seriesPlanFromStart, seriesRealFromStart,
      firstRegisteredKey, lastRegisteredKey,
      planPortfolioAtLastReg, realPortfolioAtLastReg,
      realVsPlanDelta, realVsPlanRatio,
      fiTarget, ageAtFiPlan, ageAtFiReal,
      // v5 · "Antes de Mi Plan"
      effectiveReturn,
      usingDeclaredExpenses: useDeclaredExpensesNow,
    };
  }, [state, activePlan, sandboxActive]);
}

// Editable number that looks like text (used inline in sentences)
function EditableNumber({ value, onChange, min, max, step = 1, suffix = '', width, color = T.accent, big = false }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  useEffect(() => { if (!editing) setDraft(String(value)); }, [value, editing]);
  const commit = () => {
    setEditing(false);
    const n = parseFloat(draft.replace(',', '.'));
    if (!isNaN(n)) {
      const clamped = Math.max(min ?? -Infinity, Math.min(max ?? Infinity, n));
      onChange(clamped);
    } else {
      setDraft(String(value));
    }
  };
  // Autosize: width based on current content (in ch units, +1 for padding)
  const displayed = editing ? draft : String(value);
  const autoWidth = width != null ? width : `${Math.max(2, displayed.length) + 1}ch`;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 2 }}>
      <input
        type="text"
        inputMode="decimal"
        value={editing ? draft : value}
        onChange={(e) => setDraft(e.target.value)}
        onFocus={(e) => { setEditing(true); setDraft(String(value)); e.target.select(); }}
        onBlur={commit}
        onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { setDraft(String(value)); e.target.blur(); } }}
        style={{
          width: autoWidth, background: 'transparent',
          border: 'none', borderBottom: '2px dashed ' + color,
          color, font: 'inherit', textAlign: 'center', outline: 'none', padding: '0 4px',
          fontSize: 'inherit', fontFamily: 'inherit',
        }}
      />
      {suffix && <span style={{ color }}>{suffix}</span>}
    </span>
  );
}

function Slider({ label, value, onChange, min, max, step = 1, suffix = '', fmt = null, accent = T.accent }) {
  const display = fmt ? fmt(value) : value + suffix;
  return (

// Reusable line chart — Recharts wrapper. Keeps old prop shape for back-compat.
function LineChart({ series, planSeries = null, height = 260, stroke = T.accent, fill = 'rgba(194,65,12,0.10)', planStroke = T.faint, showInvested = false, showAxis = true, milestones = [], onHover, sandboxSeries = null }) {
  const R = window.Recharts || {};
  const { ResponsiveContainer, ComposedChart, Area, Line, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine } = R;
  if (!ResponsiveContainer) return <div style={{ height, color: T.muted, fontFamily: T.mono, fontSize: 10 }}>Cargando gráfico…</div>;

  // Build a unified dataset by month index
  const data = series.map((s, i) => {
    const row = {
      monthIndex: i,
      age: s.age,
      year: s.year || (s.age != null ? Math.round(s.age) : i),
      portfolio: s.portfolio,
      invested: s.invested != null ? s.invested : s.aportado,
    };
    if (planSeries && planSeries[i]) row.plan = planSeries[i].portfolio;
    if (sandboxSeries && sandboxSeries[i]) row.sandbox = sandboxSeries[i].portfolio;
    return row;
  });

  // Year tick formatter: show year only at integer year boundaries
  const N = data.length;
  const startAge = series[0]?.age ?? 0;
  const endAge = series[N - 1]?.age ?? startAge + 1;
  const yearSpan = endAge - startAge;
  const yearStep = yearSpan > 25 ? 10 : yearSpan > 10 ? 5 : 2;

  const tickIndices = [];
  for (let a = Math.ceil(startAge); a <= endAge; a += yearStep) {
    const idx = Math.round((a - startAge) / yearSpan * (N - 1));
    tickIndices.push(idx);
  }

  const tooltipFmt = (value, name) => {
    const labels = { portfolio: 'Total', plan: 'Plan inicial', invested: 'Aportado', sandbox: 'Probador' };
    return [fmtEur(value), labels[name] || name];
  };

  return (
    <div style={{ width: '100%', height }}>
      <ResponsiveContainer>
        <ComposedChart data={data} margin={{ top: 12, right: 18, left: 0, bottom: 8 }}>
          <CartesianGrid stroke={T.lineSoft} strokeDasharray="2 4" vertical={false} />
          <XAxis
            dataKey="monthIndex"
            ticks={tickIndices}
            tickFormatter={(v) => {
              const row = data[v]; if (!row) return '';
              return Math.round(row.age) + '';
            }}
            tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 10 }}
            axisLine={{ stroke: T.line }}
            tickLine={false}
          />
          <YAxis
            tickFormatter={fmtEur}
            tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 10 }}
            axisLine={false}
            tickLine={false}
            width={56}
          />
          <Tooltip
            formatter={tooltipFmt}
            labelFormatter={(v) => {
              const row = data[v]; if (!row) return '';
              return `${Math.round(row.age)} años`;
            }}
            contentStyle={{
              background: T.ink, border: 'none', borderRadius: 6,
              fontFamily: T.mono, fontSize: 11, color: '#fff',
              padding: '8px 12px',
            }}
            labelStyle={{ color: 'rgba(255,255,255,0.6)', fontSize: 10, marginBottom: 4 }}
            itemStyle={{ color: '#fff' }}
            cursor={{ stroke: T.ink, strokeWidth: 1, opacity: 0.3 }}
          />
          {milestones.map((m, i) => (
            <ReferenceLine key={i} y={m.value} stroke={m.color || T.green} strokeDasharray="3 3" strokeOpacity={0.7}
              label={{ value: m.label, fill: m.color || T.green, fontFamily: T.mono, fontSize: 9, position: 'insideTopRight' }} />
          ))}
          {/* Filled area underneath the main line */}
          <Area type="monotone" dataKey="portfolio" stroke="none" fill={fill} isAnimationActive={false} />
          {showInvested && (
            <Line type="monotone" dataKey="invested" stroke={T.muted} strokeWidth={1} strokeDasharray="2 3" dot={false} isAnimationActive={false} />
          )}
          {planSeries && (
            <Line type="monotone" dataKey="plan" stroke={planStroke} strokeWidth={1.5} strokeDasharray="5 4" dot={false} isAnimationActive={false} />
          )}
          {sandboxSeries && (
            <Line type="monotone" dataKey="sandbox" stroke={T.green} strokeWidth={2.5} strokeDasharray="6 3" dot={false} isAnimationActive={false} />
          )}
          <Line type="monotone" dataKey="portfolio" stroke={stroke} strokeWidth={2.5} dot={false} isAnimationActive={false} activeDot={{ r: 5, fill: stroke }} />
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

// Small sparkline (no axes)
function Sparkline({ series, width = 120, height = 40, stroke = T.accent, fill = 'rgba(194,65,12,0.12)' }) {
  if (!series || series.length < 2) return <div style={{ width, height }} />;
  const max = Math.max(...series.map(s => s.portfolio));
  const min = Math.min(...series.map(s => s.portfolio));
  const x = (i) => (i / (series.length - 1)) * width;
  const y = (v) => height - 2 - ((v - min) / (max - min || 1)) * (height - 4);
  const path = series.map((s, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(s.portfolio)}`).join(' ');
  const area = `${path} L ${width} ${height} L 0 ${height} Z`;
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <path d={area} fill={fill} />
      <path d={path} stroke={stroke} strokeWidth="1.5" fill="none" />
    </svg>
  );
}

}

function Btn({ children, onClick, variant = 'primary', size = 'md', style = {} }) {
  const sizes = {
    sm: { padding: '8px 14px', fontSize: 11 },

  };
  const variants = {

  return (

// Progression wizard — generate income tramos from an initial value + rule
function ProgressionWizard({ onClose, onApply }) {
  const [data, setData] = useState({
    initial: 2000,
    increment: 200,
    everyMonths: 12,
    cap: 5000,
    from: todayKey(),
    durationMonths: 240, // 20 years horizon by default
    label: 'Salario',
    replace: true,
  });
  const set = (k, v) => setData(d => ({ ...d, [k]: v }));

  const preview = useMemo(() => {
    const tramos = [];
    let amount = data.initial;
    let cursor = data.from;
    const end = addMonthsKey(data.from, data.durationMonths);
    while (compareKeys(cursor, end) < 0 && amount <= data.cap + 1) {
      const next = addMonthsKey(cursor, data.everyMonths);
      const nextAmount = amount + data.increment;
      const to = (nextAmount > data.cap || compareKeys(next, end) >= 0) ? null : addMonthsKey(next, -1);
      tramos.push({
        id: uid(),
        from: cursor,
        to: to,
        amount: Math.min(amount, data.cap),
        label: data.label,
      });
      if (nextAmount > data.cap) break;
      cursor = next;
      amount = nextAmount;
    }
    return tramos;
  }, [data]);

  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 16, zIndex: 200,

        border: '1px solid ' + T.line, boxShadow: '0 20px 60px rgba(0,0,0,0.3)',

        <div style={{
          position: 'sticky', top: -24, marginTop: -24, marginLeft: -24, marginRight: -24,
          padding: '16px 20px 12px', background: T.bg, borderBottom: '1px solid ' + T.line,

          </div>
          <button onClick={onClose} aria-label="Cerrar" style={{
            background: T.ink, color: '#fff', border: 'none', width: 36, height: 36, borderRadius: 999,
            fontSize: 20, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0, lineHeight: 1,

        </div>

        <div style={{ fontFamily: T.serif, fontSize: 13, color: T.muted, fontStyle: 'italic', marginBottom: 14 }}>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginBottom: 14 }}>
          <div>

              style={{ fontFamily: T.mono, fontSize: 13, padding: '7px 8px', width: '100%', background: T.paper, border: '1px solid ' + T.line, borderRadius: 6, color: T.ink, outline: 'none' }} />

// Helpers to mutate tramos/events through the store (sandbox-aware via mutatePlan)
function usePlanMutators() {
  const { mutatePlan } = useStore();
  return useMemo(() => ({
    addIncome: () => mutatePlan(p => {
      const existing = p.incomeSegments || [];
      // Place new tramo after the last existing one (or today if empty)
      const sorted = [...existing].sort((a, b) => compareKeys(a.from || '', b.from || ''));
      const last = sorted[sorted.length - 1];
      const fromKey = last ? (last.to ? addMonthsKey(last.to, 1) : addMonthsKey(last.from, 12)) : todayKey();
      // Close the last one if it was open
      const updated = sorted.map((s, i) => i === sorted.length - 1 && !s.to ? { ...s, to: addMonthsKey(fromKey, -1) } : s);
      return { ...p, incomeSegments: [...updated, { id: uid(), from: fromKey, to: null, amount: last ? last.amount : 2000, label: 'Nuevo tramo' }] };
    }),
    updateIncome: (id, patch) => mutatePlan(p => ({ ...p, incomeSegments: (p.incomeSegments || []).map(s => s.id === id ? { ...s, ...patch } : s) })),
    deleteIncome: (id) => mutatePlan(p => ({ ...p, incomeSegments: (p.incomeSegments || []).filter(s => s.id !== id) })),
    addBonus: () => mutatePlan(p => ({ ...p, bonusSegments: [...(p.bonusSegments || []), { id: uid(), from: todayKey(), to: null, amount: 300, label: 'Plus' }] })), // bonus tramos sumando son OK
    updateBonus: (id, patch) => mutatePlan(p => ({ ...p, bonusSegments: (p.bonusSegments || []).map(s => s.id === id ? { ...s, ...patch } : s) })),
    deleteBonus: (id) => mutatePlan(p => ({ ...p, bonusSegments: (p.bonusSegments || []).filter(s => s.id !== id) })),
    addSaving: () => mutatePlan(p => {
      const existing = p.savingSegments || [];
      const sorted = [...existing].sort((a, b) => compareKeys(a.from || '', b.from || ''));
      const last = sorted[sorted.length - 1];
      const fromKey = last ? (last.to ? addMonthsKey(last.to, 1) : addMonthsKey(last.from, 12)) : todayKey();
      const updated = sorted.map((s, i) => i === sorted.length - 1 && !s.to ? { ...s, to: addMonthsKey(fromKey, -1) } : s);
      const defaults = last ? { type: last.type, value: last.value } : { type: 'fixed', value: 300 };
      return { ...p, savingSegments: [...updated, { id: uid(), from: fromKey, to: null, ...defaults, label: 'Aporte' }] };
    }),
    updateSaving: (id, patch) => mutatePlan(p => ({ ...p, savingSegments: (p.savingSegments || []).map(s => s.id === id ? { ...s, ...patch } : s) })),
    deleteSaving: (id) => mutatePlan(p => ({ ...p, savingSegments: (p.savingSegments || []).filter(s => s.id !== id) })),
    addEvent: () => mutatePlan(p => ({ ...p, events: [...(p.events || []), { id: uid(), date: addMonthsKey(todayKey(), 3), amount: 1000, label: 'Bonus', status: 'confirmado' }] })),
    updateEvent: (id, patch) => mutatePlan(p => ({ ...p, events: (p.events || []).map(e => e.id === id ? { ...e, ...patch } : e) })),
    deleteEvent: (id) => mutatePlan(p => ({ ...p, events: (p.events || []).filter(e => e.id !== id) })),
    replaceIncomeWith: (newTramos, replace) => mutatePlan(p => ({ ...p, incomeSegments: replace ? newTramos : [...(p.incomeSegments || []), ...newTramos] })),
    normalizeIncome: () => mutatePlan(p => ({ ...p, incomeSegments: normalizeSegments(p.incomeSegments || []) })),
    normalizeBonus: () => mutatePlan(p => ({ ...p, bonusSegments: normalizeSegments(p.bonusSegments || []) })),
    normalizeSaving: () => mutatePlan(p => ({ ...p, savingSegments: normalizeSegments(p.savingSegments || []) })),
    splitTramo: (kind, id) => mutatePlan(p => {
      const listKey = kind === 'income' ? 'incomeSegments' : kind === 'bonus' ? 'bonusSegments' : 'savingSegments';
      const list = p[listKey] || [];
      const idx = list.findIndex(s => s.id === id);
      if (idx < 0) return p;
      const s = list[idx];
      // Split at midpoint or 12 months from start if no end
      const endKey = s.to || addMonthsKey(s.from, 24);
      const midKey = addMonthsKey(s.from, Math.max(1, Math.floor((parseKeyMonths(endKey) - parseKeyMonths(s.from)) / 2)));
      const before = { ...s, to: addMonthsKey(midKey, -1) };
      const after = { ...s, id: uid(), from: midKey };
      const newList = [...list.slice(0, idx), before, after, ...list.slice(idx + 1)];
      return { ...p, [listKey]: newList };
    }),
  }), [mutatePlan]);
}

function parseKeyMonths(key) {
  const [y, m] = key.split('-').map(Number);
  return y * 12 + (m - 1);
}
