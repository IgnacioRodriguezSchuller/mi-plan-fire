      <div style={{ minWidth: 0 }}>
        <Label style={{ marginBottom: 2 }}>Plan</Label>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>

        {seg && seg.type === 'percent' && incomeAtMonth > 0 && (

            width: '100%', fontFamily: T.serif, fontStyle: month.note ? 'italic' : 'normal',

            limpiar
          </button>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PROYECCIÓN — full interactive simulator
// ─────────────────────────────────────────────────────────────
// PROYECCIÓN — sandbox-aware, with tramo timeline + Recharts
// ─────────────────────────────────────────────────────────────
// v5.9 · Inline editor for Proyección's session-only assumption sandbox.
// `overrides` is the partial of fields that diverge from the plan; the caller
// owns the state. Changing a field reports back via `onChange({ key: value })`,
// or resets it by passing the original plan value.
function SupuestosEditables({ plan, profile, overrides, onChange, onApply, onReset, disabled }) {
  const planVals = {
    inflationRate: plan.inflationRate != null ? plan.inflationRate : 2.5,
    annualReturn: plan.annualReturn != null ? plan.annualReturn : 8,
    withdrawalRate: plan.withdrawalRate != null ? plan.withdrawalRate : 4.0,
    retireAge: profile.retireAge,
    lifeExpectancy: plan.lifeExpectancy != null ? plan.lifeExpectancy : 90,
  };
  const cur = (k) => overrides[k] != null ? overrides[k] : planVals[k];
  const isDiff = (k) => overrides[k] != null && overrides[k] !== planVals[k];
  const setField = (k, v) => {
    // Build the next overrides object explicitly so we can drop the key when
    // the value matches the plan. The parent replaces the whole overrides state.
    if (v === planVals[k]) {
      const { [k]: _drop, ...rest } = overrides;
      onChange(rest);
    } else {
      onChange({ ...overrides, [k]: v });
    }
  };
  const hasOverrides = Object.keys(overrides).length > 0;

  const Field = ({ k, label, min, max, step, suffix }) => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8 }}>
        <span style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.muted }}>{label}</span>
        {isDiff(k) && (
          <span style={{ fontFamily: T.mono, fontSize: 9, color: T.amber, letterSpacing: '0.08em', textTransform: 'uppercase' }}>modificado</span>
        )}
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, fontFamily: T.display, fontSize: 22, color: isDiff(k) ? T.amber : T.ink }}>
        <EditableNumber value={cur(k)} onChange={(v) => setField(k, v)} min={min} max={max} step={step} color={isDiff(k) ? T.amber : T.ink} />
        <span style={{ fontSize: 14, color: T.muted }}>{suffix}</span>
      </div>
      {isDiff(k) && (
        <div style={{ fontFamily: T.mono, fontSize: 9, color: T.faint, letterSpacing: '0.04em' }}>
          original: {planVals[k]}{suffix}
        </div>
      )}
    </div>
  );

  return (
    <Card pad={16} style={disabled ? { opacity: 0.6 } : {}}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, flexWrap: 'wrap', marginBottom: 14 }}>
        <div>
          <Label>Supuestos</Label>
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 4, lineHeight: 1.5 }}>
            Edita aquí cualquier supuesto y verás el chart y el Monte Carlo recalcularse al instante. Los cambios viven solo en esta pantalla hasta que pulses <strong style={{ color: T.ink, fontStyle: 'normal' }}>Aplicar a mi plan</strong>.
          </div>
        </div>
        {hasOverrides && (
          <span style={{ fontFamily: T.mono, fontSize: 10, color: T.amber, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            ⚠ supuestos modificados · solo en esta sesión
          </span>
        )}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 16 }}>
        <Field k="inflationRate" label="Inflación anual" min={0} max={15} step={0.1} suffix="%" />
        <Field k="annualReturn" label="Rentabilidad media anual" min={0} max={20} step={0.5} suffix="%" />
        <Field k="withdrawalRate" label="Tasa de retiro" min={2} max={8} step={0.1} suffix="%" />
        <Field k="retireAge" label="Edad objetivo FIRE" min={profile.age + 1} max={90} step={1} suffix="" />
        <Field k="lifeExpectancy" label="Esperanza de vida" min={70} max={110} step={1} suffix="" />
      </div>
      {disabled && (
        <div style={{ marginTop: 14, fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 12, lineHeight: 1.5 }}>
          Estás en modo Probador. Los Supuestos editables se aplican sobre tu plan real, no sobre el escenario del Probador.
        </div>
      )}
      {hasOverrides && !disabled && (
        <div style={{ display: 'flex', gap: 10, marginTop: 16, flexWrap: 'wrap', paddingTop: 14, borderTop: '1px dashed ' + T.lineSoft }}>
          <Btn variant="accent" size="sm" onClick={onApply}>Aplicar a mi plan</Btn>
          <Btn variant="ghost" size="sm" onClick={onReset}>Restaurar valores de Ajustes</Btn>
        </div>
      )}
    </Card>
  );
}

function ScreenProyeccion() {
  const { state, activePlan, sandboxActive, startSandbox, applySandbox, discardSandbox, updatePlan, updateProfile } = useStore();
  const d = useDerived();
  const { profile, plan } = state;
  const mobile = useIsMobile();
  const realMode = state.displayMode === 'real';

  // v5.9 · Session-only overrides for SupuestosEditables. Affect the chart and
  // Monte Carlo within this screen but NOT Mi Plan or other sections.
  // Empty object {} when in sync with the plan; setting a value adds it; calling
  // applyOverrides() propagates to Ajustes via updatePlan/updateProfile and clears.
  const [overrides, setOverrides] = useState({});
  const hasOverrides = Object.keys(overrides).length > 0;
  // Disable the sandbox while overrides are active to keep semantics clear:
  // overrides apply on top of the real plan, not on top of an experimental scenario.
  const effectivePlan = useMemo(() => {
    const { retireAge: _ignore, ...planOver } = overrides;
    return sandboxActive ? activePlan : { ...plan, ...planOver };
  }, [plan, activePlan, sandboxActive, overrides]);
  const effectiveProfile = useMemo(() => ({
    ...profile,
    retireAge: overrides.retireAge != null ? overrides.retireAge : profile.retireAge,
  }), [profile, overrides]);
  const effectiveInflRate = effectivePlan.inflationRate != null ? effectivePlan.inflationRate : 2.5;
  const inflRate = effectiveInflRate;

  // Capital de partida para la curva activa (sandbox usa su propio capital, plan real el suyo)
  const activeStartCapital = sandboxActive
    ? (activePlan.capital || 0) + d.totalActual
    : d.currentPortfolio;

  // Helper to convert a series to real mode (in-place style).
  // Uses the row's `key` to compute monthsFromNow so it works for
  // series that start in the past (dual curves) as well as today.
  const applyRealMode = useCallback((s) => {
    if (!realMode || !s) return s;
    const tk = todayKey();
    const [ty, tm] = tk.split('-').map(Number);
    return s.map((row, i) => {
      let monthsFromNow = i;
      if (row && row.key) {
        const [yy, mm] = row.key.split('-').map(Number);
        monthsFromNow = (yy - ty) * 12 + (mm - tm);
      }
      return {
        ...row,
        portfolio: toRealEur(row.portfolio, monthsFromNow, inflRate),
        aportado: toRealEur(row.aportado, monthsFromNow, inflRate),
        growth: toRealEur(row.growth, monthsFromNow, inflRate),
      };
    });
  }, [realMode, inflRate]);

  // Active plan (real or sandbox) curve — uses effectivePlan/effectiveProfile
  // so SupuestosEditables propagates to the chart even without sandbox.
  const seriesActiveNominal = useMemo(() => projectV2(effectivePlan, effectiveProfile, {
    capital: activeStartCapital,
    includeHypothetical: true,
  }), [effectivePlan, effectiveProfile, activeStartCapital]);
  const seriesActive = useMemo(() => applyRealMode(seriesActiveNominal), [seriesActiveNominal, applyRealMode]);

  // Reference: real plan without hypothetical events (with overrides applied)
  const seriesRealNominal = useMemo(() => projectV2(effectivePlan, effectiveProfile, {
    capital: d.currentPortfolio,
    includeHypothetical: false,
  }), [effectivePlan, effectiveProfile, d.currentPortfolio]);
  const seriesReal = useMemo(() => applyRealMode(seriesRealNominal), [seriesRealNominal, applyRealMode]);

  // For non-sandbox mode, also show "if all events confirmed" line
  const seriesRealWithHypoNominal = useMemo(() => projectV2(effectivePlan, effectiveProfile, {
    capital: d.currentPortfolio,
    includeHypothetical: true,
  }), [effectivePlan, effectiveProfile, d.currentPortfolio]);
  const seriesRealWithHypo = useMemo(() => applyRealMode(seriesRealWithHypoNominal), [seriesRealWithHypoNominal, applyRealMode]);

  // Dual curves: plan original vs real reconstructed (from first registered month).
  // Pre-computed in useDerived; here we just convert to real mode if needed.
  const seriesPlanFromStart = useMemo(() => applyRealMode(d.seriesPlanFromStart), [d.seriesPlanFromStart, applyRealMode]);
  const seriesRealFromStart = useMemo(() => applyRealMode(d.seriesRealFromStart), [d.seriesRealFromStart, applyRealMode]);

  const finalActive = seriesActive[seriesActive.length - 1];
  const finalReal = seriesReal[seriesReal.length - 1];

  // Build scenarios array for the chart
  const scenarios = useMemo(() => {
    const arr = [];
    if (sandboxActive) {
      arr.push({ label: 'Plan real', color: T.faint, series: seriesReal, dashed: true });
      arr.push({ label: 'Probador', color: T.accent, series: seriesActive, bold: true });
    } else if (d.firstRegisteredKey && d.realPortfolioAtLastReg != null && d.planPortfolioAtLastReg != null) {
      // Dual curves take protagonist role when there is real history.
      // Real curve color signals direction vs plan original at last registered date.
      const inLine = d.realVsPlanRatio != null && Math.abs(d.realVsPlanRatio - 1) < 0.01;
      const ahead = !inLine && d.realVsPlanDelta != null && d.realVsPlanDelta > 0;
      const realColor = inLine ? T.accent : ahead ? T.green : T.red;
      arr.push({ label: 'Plan original', color: T.faint, series: seriesPlanFromStart, dashed: true });
      arr.push({ label: 'Curva real', color: realColor, series: seriesRealFromStart, bold: true });
      if (finalReal.portfolio !== seriesRealWithHypo[seriesRealWithHypo.length - 1].portfolio) {
        arr.push({ label: 'Con eventos posibles', color: T.amber, series: seriesRealWithHypo, dashed: true });
      }
    } else {
      arr.push({ label: 'Confirmados', color: T.accent, series: seriesReal, bold: true });
      if (finalReal.portfolio !== seriesRealWithHypo[seriesRealWithHypo.length - 1].portfolio) {
        arr.push({ label: 'Con eventos posibles', color: T.amber, series: seriesRealWithHypo, dashed: true });
      }
    }
    return arr;
  }, [sandboxActive, seriesActive, seriesReal, seriesRealWithHypo, finalReal, d.firstRegisteredKey, d.realPortfolioAtLastReg, d.planPortfolioAtLastReg, d.realVsPlanRatio, d.realVsPlanDelta, seriesPlanFromStart, seriesRealFromStart]);

  const yearMilestones = useMemo(() => {
    const years = [1, 5, 10, 20, 30, profile.retireAge - profile.age]
      .filter((v, i, a) => a.indexOf(v) === i && v > 0 && v <= profile.retireAge - profile.age);
    return years.map(yr => {
      const idx = Math.min(yr * 12, seriesActive.length - 1);
      return { years: yr, ...seriesActive[idx] };
    });
  }, [seriesActive, profile]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24, paddingBottom: 40 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
        <div style={{ flex: 1, minWidth: 200 }}>
          <Label>Proyección</Label>
          <div style={{ fontFamily: T.display, fontSize: 'clamp(28px, 3.4vw, 44px)', lineHeight: 1.15, letterSpacing: '-0.02em', marginTop: 4 }}>
            A los <em style={{ color: T.accent }}>{profile.retireAge}</em>: <span style={{ color: T.accent }}>{fmtEur(finalActive.portfolio)}</span>
          </div>
          {sandboxActive && (
            <div style={{ fontFamily: T.mono, fontSize: 11, color: T.amber, marginTop: 8, letterSpacing: '0.05em' }}>
              Plan real: {fmtEur(finalReal.portfolio)} · diff {finalActive.portfolio - finalReal.portfolio >= 0 ? '+' : ''}{fmtEur(finalActive.portfolio - finalReal.portfolio)}
            </div>
          )}
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, marginTop: 6 }}>
            {sandboxActive
              ? 'Estás explorando un escenario sobre el plan. Cambios sólo en este modo.'
              : 'Con los tramos, ahorros y eventos confirmados de tu plan actual.'}
          </div>
        </div>
        {!sandboxActive ? (
          <Btn variant="ghost" size="sm" onClick={startSandbox}>Probar escenario →</Btn>
        ) : (
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn variant="ghost" size="sm" onClick={discardSandbox}>Descartar</Btn>
            <Btn variant="accent" size="sm" onClick={applySandbox}>Aplicar al plan</Btn>
          </div>
        )}
      </div>

      {/* v5.9 · Supuestos editables — session-only sandbox of assumptions. */}
      <SupuestosEditables
        plan={plan}
        profile={profile}
        overrides={overrides}
        onChange={(next) => setOverrides(next)}
        onApply={() => {
          // Propagate overrides to Ajustes:
          const { retireAge, ...planFields } = overrides;
          if (Object.keys(planFields).length > 0) updatePlan(planFields);
          if (retireAge != null) updateProfile({ retireAge });
          setOverrides({});
        }}
        onReset={() => setOverrides({})}
        disabled={sandboxActive}
      />

      {/* Main chart */}
      <Card pad={mobile ? 16 : 26} style={{ minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14, flexWrap: 'wrap', gap: 8 }}>
          <div>
            <Label>Curva de patrimonio</Label>
            {realMode && (
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 11, color: T.muted, marginTop: 2 }}>
                ajustado por inflación {inflRate}% anual
              </div>
            )}
          </div>
          <DisplayModeToggle />
          <div style={{ display: 'flex', gap: 10, fontFamily: T.mono, fontSize: 9, color: T.muted, letterSpacing: '0.08em', textTransform: 'uppercase', flexWrap: 'wrap' }}>
            {scenarios.map((sc, i) => <LegendChip key={i} color={sc.color} label={sc.label} dashed={sc.dashed} />)}
          </div>
        </div>
        <MultiLineChart scenarios={scenarios} height={mobile ? 240 : 360} />
        <div style={{ marginTop: 12, fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, lineHeight: 1.55 }}>
          Esta curva asume que el mercado se comporta según la media histórica. La realidad rara vez sigue una línea: habrá años mejores y peores. Lo que importa es el promedio a tu horizonte, no la cifra exacta de un año concreto.
        </div>
      </Card>

      {/* Quick adjustments */}
      <Card>
        <Label style={{ marginBottom: 14 }}>Ajustes rápidos {sandboxActive && <span style={{ color: T.amber, marginLeft: 8 }}>· en escenario</span>}</Label>
        <div style={{ display: 'grid', gridTemplateColumns: mobile ? '1fr' : 'repeat(2, 1fr)', gap: mobile ? 14 : 20 }}>
          <div>
            <Slider label="Retorno anual" value={activePlan.annualReturn || 8} onChange={(v) => updatePlan({ annualReturn: v })} min={0} max={20} step={0.5} suffix="%" />
            {(activePlan.annualReturn || 8) > 15 && (
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.amber, fontSize: 13, marginTop: 6, lineHeight: 1.5 }}>
                Por encima del 15% anual es expectativa muy optimista a largo plazo.
              </div>
            )}
          </div>
          <Slider label="Jubilación" value={profile.retireAge} onChange={(v) => updateProfile({ retireAge: v })} min={profile.age + 1} max={85} suffix=" años" />
          <Slider label="Capital inicial" value={activePlan.capital || 0} onChange={(v) => updatePlan({ capital: v })} min={0} max={200000} step={500} fmt={fmtEur} />
        </div>
        <div style={{ marginTop: 16, padding: 12, background: T.panel, border: '1px solid ' + T.line, borderRadius: 8, fontFamily: T.serif, fontSize: 13, color: T.muted, lineHeight: 1.5 }}>
          Para editar ingresos, aportes y eventos, ve a <strong style={{ color: T.ink }}>Ajustes</strong>. Lo que cambies allí actualiza esta curva al instante.
        </div>
      </Card>

      {/* Year-by-year breakdown */}
      <Card pad={mobile ? 18 : 28}>
        <Label style={{ marginBottom: 14 }}>Tu yo del futuro</Label>
        <div style={{ display: 'grid', gridTemplateColumns: mobile ? 'repeat(2, 1fr)' : 'repeat(auto-fit, minmax(140px, 1fr))', gap: 14 }}>
          {yearMilestones.map((m) => (
            <div key={m.years} style={{ borderLeft: '2px solid ' + T.accent, paddingLeft: 12, paddingTop: 4, paddingBottom: 4 }}>
              <Label>En {m.years} año{m.years === 1 ? '' : 's'}</Label>
              <div style={{ fontFamily: T.display, fontSize: 28, color: T.ink, letterSpacing: '-0.01em', marginTop: 4, lineHeight: 1.1 }}>{fmtEur(m.portfolio)}</div>
              <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, marginTop: 4 }}>
                {Math.round(m.age)} años · {fmtEur(m.aportado)} aportados
              </div>
              <div style={{ fontFamily: T.mono, fontSize: 10, color: T.green, marginTop: 2 }}>
                +{fmtEur(m.growth)} de interés
              </div>
            </div>
          ))}
        </div>
      </Card>

      {/* Monte Carlo — moved out of Mi Plan in v5.9. Receives effectivePlan /
          effectiveProfile so SupuestosEditables modifies the simulation. */}
      <MonteCarloCard plan={effectivePlan} profile={effectiveProfile} d={d} realMode={realMode} inflRate={effectiveInflRate} />
    </div>
  );
}

function MultiLineChart({ scenarios, height = 320, onHover }) {
  const R = window.Recharts || {};
  const { ResponsiveContainer, LineChart: RLC, Line, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine } = R;
  if (!ResponsiveContainer) return <div style={{ height, color: T.muted, fontFamily: T.mono, fontSize: 10 }}>Cargando gráfico…</div>;

  // Build rows aligned by age (month precision) so scenarios with different
  // starting ages stay visually aligned on the X axis.
  const ageMap = new Map();
  scenarios.forEach((sc, k) => {
    (sc.series || []).forEach((row) => {
      if (row.age == null) return;
      const ageKey = Math.round(row.age * 12) / 12; // 1-month precision
      if (!ageMap.has(ageKey)) ageMap.set(ageKey, { age: ageKey });
      ageMap.get(ageKey)['s' + k] = row.portfolio;
    });
  });
  const data = Array.from(ageMap.values()).sort((a, b) => a.age - b.age);
  const startAge = data.length ? data[0].age : 0;
  const endAge = data.length ? data[data.length - 1].age : startAge + 1;
  const span = Math.max(0.5, endAge - startAge);
  const tickStep = span > 25 ? 10 : span > 10 ? 5 : span > 4 ? 2 : 1;
  const ticks = [];
  for (let a = Math.ceil(startAge); a <= endAge; a += tickStep) ticks.push(a);

  return (
    <div style={{ width: '100%', height }}>
      <ResponsiveContainer>
        <RLC data={data} margin={{ top: 12, right: 18, left: 0, bottom: 8 }}>
          <CartesianGrid stroke={T.lineSoft} strokeDasharray="2 4" vertical={false} />
          <XAxis
            dataKey="age"
            type="number"
            domain={['dataMin', 'dataMax']}
            ticks={ticks}
            tickFormatter={(v) => Math.round(v) + ''}
            tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 10 }}
            axisLine={{ stroke: T.line }}
            tickLine={false}
          />
          <YAxis
            tickFormatter={fmtEur}
            tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 10 }}
            axisLine={false}
            tickLine={false}
            width={56}
          />
          <Tooltip
            formatter={(value, name) => {
              const i = parseInt(name.replace('s', ''), 10);
              return [fmtEur(value), scenarios[i]?.label || name];
            }}
            labelFormatter={(age) => `${Math.round(age)} años`}
            contentStyle={{ background: T.ink, border: 'none', borderRadius: 6, fontFamily: T.mono, fontSize: 11, color: '#fff', padding: '8px 12px' }}
            labelStyle={{ color: 'rgba(255,255,255,0.6)', fontSize: 10, marginBottom: 4 }}
            itemStyle={{ color: '#fff' }}
            cursor={{ stroke: T.ink, strokeWidth: 1, opacity: 0.3 }}
          />
          {scenarios.map((sc, k) => (
            <Line key={k} type="monotone" dataKey={'s' + k} stroke={sc.color} strokeWidth={sc.bold ? 2.8 : 1.6}
              strokeDasharray={sc.dashed ? '5 4' : '0'}
              dot={false} isAnimationActive={false} connectNulls={false}
              activeDot={{ r: sc.bold ? 5 : 3.5, fill: sc.color }} />
          ))}
        </RLC>
      </ResponsiveContainer>
    </div>
  );
}

// Read-only view of hitos for ScreenSeguimiento. No add/remove, no inline edit.
function HitosOverview() {
  const { state } = useStore();
  const d = useDerived();
  const { profile, plan, goals } = state;
  if (goals.length === 0) {
    return (
      <Card style={{ borderStyle: 'dashed', padding: 24 }}>
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, lineHeight: 1.55 }}>
          Aún no has añadido hitos. Defínelos en <strong style={{ color: T.ink, fontStyle: 'normal' }}>Ajustes → Hitos</strong> y aquí verás el seguimiento de tu progreso hacia cada uno.
        </div>
      </Card>
    );
  }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {goals.map((g) => {
        const series = d.seriesPlan || [];
        let projected = null;
        for (let i = 0; i < series.length; i++) {
          if ((series[i].portfolio || 0) >= g.target) { projected = { age: series[i].age, months: i }; break; }
        }
        const onTrack = projected && projected.age <= g.targetAge;
        const progress = Math.min(100, (d.currentPortfolio || 0) / g.target * 100);
        return (
          <Card key={g.id}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
              <div style={{ fontFamily: T.display, fontSize: 22, letterSpacing: '-0.01em' }}>{g.name}</div>
              <div style={{ fontFamily: T.mono, fontSize: 10, color: onTrack ? T.green : T.amber, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
                {onTrack ? 'En camino' : 'Vas justo'}
              </div>
            </div>
            <div style={{ marginTop: 8, fontFamily: T.serif, color: T.muted, fontSize: 13, lineHeight: 1.5 }}>
              Meta: <strong style={{ color: T.accent, fontStyle: 'normal' }}>{fmtEur(g.target)}</strong> a los {g.targetAge}. A tu ritmo actual: {projected ? <>llegarías a los <strong style={{ color: T.ink, fontStyle: 'normal' }}>{projected.age.toFixed(1)}</strong></> : 'fuera de alcance dentro de tu horizonte'}.
            </div>
            <div style={{ marginTop: 10, height: 8, background: T.line, borderRadius: 999, overflow: 'hidden' }}>
              <div style={{ width: progress + '%', height: '100%', background: onTrack ? T.green : T.accent, borderRadius: 999 }} />
            </div>
            <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, marginTop: 4, letterSpacing: '0.08em' }}>
              {Math.round(progress)}% logrado · {fmtEur(d.currentPortfolio)} de {fmtEur(g.target)}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function GoalRow({ goal, d, profile, plan, onChange, onRemove }) {
  // When does the plan curve reach the goal target?
  const tg = useMemo(() => {
    // Use the actual plan curve from useDerived (already projected with v2 engine)
    const series = d.seriesPlan || [];
    for (let i = 0; i < series.length; i++) {
      if (series[i].portfolio >= goal.target) {
        return { age: series[i].age, months: i };
      }
    }
    return null; // not reachable within retirement horizon
  }, [d.seriesPlan, goal.target]);

  // Monthly aporte needed to reach target by goal.targetAge (closed form, simple)
  const needMonthly = useMemo(() => monthlyForGoal({
    age: profile.age, targetAge: goal.targetAge, capital: d.currentPortfolio, ret: plan.annualReturn, target: goal.target,
  }), [profile, goal, plan, d]);
  const currentAporte = d.currentAporte || 0;
  const onTrack = tg && tg.age <= goal.targetAge;
  const progress = Math.min(100, d.currentPortfolio / goal.target * 100);

  return (
    <Card>
      <button onClick={onRemove} title="Eliminar meta"
        style={{
          position: 'absolute', top: 10, right: 12,
          fontFamily: T.mono, fontSize: 14, color: T.faint,
          background: 'transparent', border: 'none', cursor: 'pointer',
          padding: '4px 6px', lineHeight: 1, borderRadius: 4,
        }}>×</button>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 100%', minWidth: 0, paddingRight: 28 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 2 }}>
            <input value={goal.name} onChange={(e) => onChange({ name: e.target.value })}
              style={{ fontFamily: T.display, fontSize: 26, letterSpacing: '-0.01em', background: 'transparent', border: 'none', outline: 'none', color: T.ink, padding: 0, flex: '1 1 60%', minWidth: 100 }} />
            <Pill color={onTrack ? T.green : T.amber} bg={onTrack ? T.greenSoft : 'rgba(180,83,9,0.10)'} border="transparent" style={{ fontSize: 9, padding: '3px 8px' }}>
              {onTrack ? 'En camino' : 'Falta'}
            </Pill>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, marginTop: 8 }}>
            <span style={{ fontFamily: T.display, fontSize: 26, color: T.accent }}>
              <EditableNumber value={goal.target} onChange={(v) => onChange({ target: v })} min={100} max={10_000_000} width={100} color={T.accent} />€
            </span>
            <span style={{ fontFamily: T.serif, color: T.muted }}>a los <EditableNumber value={goal.targetAge} onChange={(v) => onChange({ targetAge: v })} min={profile.age + 1} max={90} width={36} color={T.ink} /> años</span>
          </div>
          <div style={{ marginTop: 14, height: 8, background: T.line, borderRadius: 999, overflow: 'hidden' }}>
            <div style={{ width: progress + '%', height: '100%', background: onTrack ? T.green : T.accent, borderRadius: 999, transition: 'width 0.4s' }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: T.mono, fontSize: 10, color: T.muted, marginTop: 4, letterSpacing: '0.08em' }}>
            <span>{Math.round(progress)}% logrado · {fmtEur(d.currentPortfolio)}</span>
            <span>faltan {fmtEur(Math.max(0, goal.target - d.currentPortfolio))}</span>
          </div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(110px, 1fr))', gap: 10, marginTop: 18, paddingTop: 18, borderTop: '1px dashed ' + T.lineSoft }}>
        <SmallStat label="A tu ritmo actual" value={tg ? `${tg.age.toFixed(1)} años` : '—'} sub={tg ? `en ${(tg.months / 12).toFixed(1)} años` : 'fuera de alcance'} />
        <SmallStat label="Hace falta al mes" value={fmtEur(needMonthly)} sub={`para llegar a los ${goal.targetAge}`} accent={needMonthly > currentAporte} />
        <SmallStat label="Diferencia" value={needMonthly > currentAporte ? `+${fmtEur(needMonthly - currentAporte)}/mes` : 'Vas sobrado'} sub={needMonthly > currentAporte ? `extra sobre tu ${fmtEur(currentAporte)}` : 'al ritmo actual'} good={needMonthly <= currentAporte} bad={needMonthly > currentAporte} />
      </div>
    </Card>
  );
}

// Disclaimer modal shown every time the user activates the public pension.
// Always re-shown on reactivation by design — the decision is important enough to reaffirm.
function PublicPensionDisclaimerModal({ open, onCancel, onConfirm }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = prevOverflow;
    };
  }, [open, onCancel]);
  if (!open) return null;
  return (
    <div
      onClick={onCancel}
      style={{
        position: 'fixed', inset: 0, background: 'rgba(26,22,18,0.55)',
        zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '32px 16px', overflowY: 'auto',
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: T.bg, border: '1px solid ' + T.line, borderRadius: 14,
          padding: 28, maxWidth: 560, width: '100%',
          boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
        }}>
        <div style={{ fontFamily: T.display, fontSize: 28, letterSpacing: '-0.01em', lineHeight: 1.2, marginBottom: 8, color: T.ink }}>
          Activar pensión pública
        </div>
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 15, color: T.muted, marginBottom: 18, lineHeight: 1.5 }}>
          Antes de incluirla en tu plan, lee esto.
        </div>
        <div style={{ fontFamily: T.serif, fontSize: 15, color: T.ink, lineHeight: 1.6, display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 22 }}>
          <p style={{ margin: 0 }}>
            La pensión pública española opera bajo sistema de reparto: las cotizaciones actuales pagan las pensiones actuales. La proporción de cotizantes por pensionista lleva una década cayendo y los informes oficiales prevén que siga cayendo durante las próximas tres décadas.
          </p>
          <p style={{ margin: 0 }}>
            Eso no significa que el sistema vaya a colapsar mañana. Sí significa que las pensiones futuras pueden mantener cuantía nominal pero perder poder adquisitivo, endurecer requisitos, o ver modificada la fórmula de cálculo. Las reformas de 2011, 2013, 2021 y 2023 ya han modificado la fórmula varias veces.
          </p>
          <p style={{ margin: 0 }}>
            <strong style={{ fontStyle: 'normal' }}>Mi Plan FIRE recomienda planificar tu independencia financiera sin contar con la pensión pública</strong>, y considerarla como ingreso adicional cuando llegue, no como pilar del plan. Si decides incluirla en tu proyección, hazlo sabiendo que es la variable más incierta de tu plan a 30 años.
          </p>
        </div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
          <Btn variant="ghost" size="md" onClick={onCancel}>Cancelar</Btn>
          <Btn variant="amber" size="md" onClick={onConfirm}>Activar de todas formas</Btn>
        </div>
      </div>
    </div>
  );
}

function PublicPensionCard({ plan, updatePlan, profile }) {
  const pen = plan.publicPension || { enabled: false, startAge: 67, monthlyAmount: 0, yearsContributed: 0, autoEstimate: true };
  const enabled = !!pen.enabled;
  const autoEstimate = !!pen.autoEstimate;
  const yearsContributed = pen.yearsContributed != null ? pen.yearsContributed : 0;
  const [showDisclaimer, setShowDisclaimer] = useState(false);

  // Auto-estimate uses current monthly income as proxy for average cotization base.
  const currentMonthlyBase = useMemo(() => computeIncomeFor(plan, todayKey()), [plan]);
  const autoResult = useMemo(() => estimateSpanishPension({
    avgMonthlyBase: currentMonthlyBase,
    yearsContributed,
  }), [currentMonthlyBase, yearsContributed]);

  // Effective monthly amount to use
  const effectiveMonthly = autoEstimate ? autoResult.monthly14 : (pen.monthlyAmount || 0);

  // Whenever auto changes, sync the stored amount so other parts of the app stay coherent
  useEffect(() => {
    if (enabled && autoEstimate && pen.monthlyAmount !== autoResult.monthly14) {
      updatePlan({
        publicPension: { ...pen, monthlyAmount: autoResult.monthly14 },
      });
    }
  }, [enabled, autoEstimate, autoResult.monthly14]);

  const updatePen = (patch) => updatePlan({ publicPension: { ...pen, ...patch } });

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, flexWrap: 'wrap', marginBottom: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <Label>Pensión pública española</Label>
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 4, lineHeight: 1.5 }}>
            La Seguridad Social complementa lo que retiras de tu cartera. Si la activas, la app reduce el patrimonio necesario para tu libertad financiera.
          </div>
        </div>
        <button onClick={() => {
            if (enabled) {
              updatePen({ enabled: false });
            } else {
              setShowDisclaimer(true);
            }
          }}
          style={{
            fontFamily: T.mono, fontSize: 10, padding: '8px 14px', borderRadius: 999,
            background: enabled ? T.green : 'transparent',
            color: enabled ? '#fff' : T.muted,
            border: '1px solid ' + (enabled ? T.green : T.line),
            cursor: 'pointer', letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 600,
          }}>{enabled ? '✓ Activa' : 'Activar'}</button>
      </div>

      {enabled && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, paddingTop: 4 }}>
          <Row label="Edad de inicio">
            <span style={{ fontFamily: T.display, fontSize: 22 }}>
              <EditableNumber value={pen.startAge || 67} onChange={(v) => updatePen({ startAge: v })} min={60} max={75} step={1} color={T.ink} /> años
            </span>
          </Row>
          <Row label="Años cotizados al jubilarte">
            <span style={{ fontFamily: T.display, fontSize: 22 }}>
              <EditableNumber value={yearsContributed} onChange={(v) => updatePen({ yearsContributed: v })} min={0} max={50} step={1} color={T.ink} /> años
            </span>
          </Row>

          {/* Auto vs manual toggle */}
          <div style={{ display: 'flex', gap: 0, padding: 2, background: T.panel, borderRadius: 999, border: '1px solid ' + T.line, alignSelf: 'flex-start' }}>
            {[
              { id: 'auto', l: 'Auto-estimar' },
              { id: 'manual', l: 'Cifra manual' },
            ].map((opt) => {
              const isActive = (opt.id === 'auto') === autoEstimate;
              return (
                <button key={opt.id} onClick={() => updatePen({ autoEstimate: opt.id === 'auto' })}
                  style={{
                    fontFamily: T.mono, fontSize: 10, padding: '7px 14px',
                    background: isActive ? T.ink : 'transparent',
                    color: isActive ? T.bg : T.muted,
                    border: 'none', borderRadius: 999, cursor: 'pointer',
                    letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 600,
                  }}>{opt.l}</button>
              );
            })}
          </div>

          {autoEstimate ? (
            <div style={{ padding: 14, background: T.panel, border: '1px solid ' + T.line, borderRadius: 10 }}>
              <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>
                Estimación según reglas 2026
              </div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, flexWrap: 'wrap' }}>
                <span style={{ fontFamily: T.display, fontSize: 32, color: T.green, letterSpacing: '-0.01em' }}>
                  {fmtEur(autoResult.monthly14)}
                </span>
                <span style={{ fontFamily: T.serif, color: T.muted, fontSize: 14 }}>/mes · 14 pagas</span>
              </div>
              <div style={{ fontFamily: T.mono, fontSize: 9, color: T.faint, marginTop: 6, letterSpacing: '0.04em' }}>
                {fmtEur(autoResult.annual)} / año · {(autoResult.percentage * 100).toFixed(1)}% de tu base reguladora
              </div>
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginTop: 10, lineHeight: 1.5 }}>
                Base estimada con tu ingreso actual ({fmtEur(currentMonthlyBase)}/mes). Reglas: 50% con 15 años → 100% con 36,5 años. Tope máximo {fmtEur(3359.6)}/mes (2026).
                {autoResult.cappedMax && <strong style={{ color: T.amber, fontStyle: 'normal' }}> Tope máximo aplicado.</strong>}
                {autoResult.cappedMin && <strong style={{ color: T.amber, fontStyle: 'normal' }}> Mínimo legal aplicado.</strong>}

            </div>
          ) : (
            <Row label="Pensión mensual (14 pagas)">
              <span style={{ fontFamily: T.display, fontSize: 22 }}>
                <EditableNumber value={pen.monthlyAmount || 0} onChange={(v) => updatePen({ monthlyAmount: v })} min={0} max={5000} step={50} color={T.ink} /> €
              </span>
            </Row>
          )}
        </div>
      )}
      <PublicPensionDisclaimerModal
        open={showDisclaimer}
        onCancel={() => setShowDisclaimer(false)}
        onConfirm={() => { setShowDisclaimer(false); updatePen({ enabled: true }); }}
      />
    </Card>
  );
}

                  onChange={(e) => setDraftLabel(e.target.value)}

                  onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { setDraftLabel(a.label); setRenaming(null); } }}
                  style={{
                    flex: 1, fontFamily: T.display, fontSize: 18, padding: '4px 6px',
                    border: '1px solid ' + T.accent, borderRadius: 6, background: T.bg, color: T.ink, outline: 'none', minWidth: 0,
                  }}
                />
              ) : (
                <button onClick={() => switchAccount(a.id)} style={{
                  flex: 1, textAlign: 'left', fontFamily: T.display, fontSize: 18,
                  background: 'transparent', border: 'none', color: T.ink, cursor: 'pointer',
                  padding: 0, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                  letterSpacing: '-0.01em',
                }}>
                  {a.label}
                  {isActive && <span style={{ fontFamily: T.mono, fontSize: 9, color: T.accent, marginLeft: 8, letterSpacing: '0.1em', textTransform: 'uppercase' }}>activa</span>}
                </button>
              )}
              <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
                <button onClick={() => isRenamingThis ? commitRename() : beginRename(a)} style={{
                  fontFamily: T.mono, fontSize: 9, padding: '6px 10px', borderRadius: 999,
                  background: 'transparent', color: T.muted, border: '1px solid ' + T.line,
                  cursor: 'pointer', letterSpacing: '0.08em', textTransform: 'uppercase',
                }}>{isRenamingThis ? 'OK' : 'Renombrar'}</button>
                {hasMultiple && (
                  <button onClick={() => deleteAccount(a.id)} style={{
                    fontFamily: T.mono, fontSize: 9, padding: '6px 10px', borderRadius: 999,
                    background: 'transparent', color: T.red, border: '1px solid ' + T.red,
                    cursor: 'pointer', letterSpacing: '0.08em', textTransform: 'uppercase',
                  }}>Borrar</button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ============================================================
// "Antes de Mi Plan" — espejo de la realidad económica actual.
// Vista mínima con los datos del onboarding principal + vista completa

// Mini-onboarding modal (4 pasos) que rellena state.plan.actualLife.
// Aparece al pulsar el CTA del ScreenSinMiPlan o desde el onboarding principal.
// `overridePlan`: cuando se llama desde el onboarding principal el plan aún no
// está en el store; el caller pasa un plan-mock derivado de los datos del
// formulario para que el modal calcule income/capital correctamente.
// `onComplete(payload)`: recibe el `actualLife` final. Si no se proporciona,
// el modal escribe directamente en el plan via `mutatePlan` (modo standalone).
// Stable module-level row components. Previously defined inside
// ActualLifeOnboarding, but a new function reference per render made React
// treat them as a different type → remount on every input event → range
// sliders lost focus mid-drag and looked frozen.
function ExpenseRow({ k, label, chips, expenses, onSetExpense }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px dashed ' + T.lineSoft, paddingBottom: 10, marginBottom: 10, gap: 12, flexWrap: 'wrap' }}>
      <div style={{ minWidth: 110 }}>
        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, letterSpacing: '0.12em', textTransform: 'uppercase' }}>{label}</div>
        <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap' }}>
          {chips.map((v) => (
            <button key={v} onClick={() => onSetExpense(k, v)} style={{
              fontFamily: T.mono, fontSize: 10, padding: '4px 9px',
              background: expenses[k] === v ? T.ink : 'transparent',
              color: expenses[k] === v ? T.bg : T.muted,
              border: '1px solid ' + (expenses[k] === v ? T.ink : T.line),
              borderRadius: 999, cursor: 'pointer',
            }}>{v}€</button>
          ))}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, fontFamily: T.display, fontSize: 22 }}>
        <EditableNumber value={expenses[k]} onChange={(v) => onSetExpense(k, v)} min={0} max={20000} color={T.ink} />
        <span style={{ fontSize: 14, color: T.muted }}>€/mes</span>
      </div>
    </div>
  );
}

function AllocRow({ k, label, fixedReturn, customKey, returnLabel, allocation, onSetAlloc, onSetCustomReturn, planReturn, isPro }) {
  // Resolve the displayed return: customReturns override → defaults.
  const customReturn = customKey
    ? (allocation.customReturns[customKey] != null
        ? allocation.customReturns[customKey]
        : (returnLabel === 'plan' ? planReturn : (customKey === 'deposits' ? 2.0 : 0)))
    : fixedReturn;
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 8, borderBottom: '1px dashed ' + T.lineSoft, paddingBottom: 12, marginBottom: 12 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', flexWrap: 'wrap', gap: 8 }}>
        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, letterSpacing: '0.12em', textTransform: 'uppercase' }}>{label}</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, fontFamily: T.display, fontSize: 22 }}>
          <EditableNumber value={allocation[k]} onChange={(v) => onSetAlloc(k, v)} min={0} max={100} step={1} color={T.ink} />
          <span style={{ fontSize: 14, color: T.muted }}>%</span>
        </div>
      </div>
      <input type="range" min="0" max="100" step="1" value={allocation[k]}
        onChange={(e) => onSetAlloc(k, +e.target.value)}
        style={{ width: '100%', accentColor: T.accent }} />
      <div style={{ fontFamily: T.mono, fontSize: 10, color: T.faint, letterSpacing: '0.06em' }}>
        rinde{' '}
        {customKey && isPro ? (
          <>
            <EditableNumber
              value={customReturn}
              onChange={(v) => onSetCustomReturn(customKey, v)}
              min={-50} max={50} step={0.5} color={T.faint} />
            % nominal
          </>
        ) : (
          <>{customReturn}% nominal</>
        )}
      </div>
    </div>
  );
}

function ActualLifeOnboarding({ onClose, onComplete, overridePlan = null }) {
  const { state, mutatePlan } = useStore();
  const plan = overridePlan || state.plan;
  const isPro = !!state.isPro;
  const tk = todayKey();
  const income = computeIncomeFor(plan, tk);
  const investment = computePlannedFor(plan, tk);
  const planReturn = plan.annualReturn || 8;
  const initial = plan.actualLife || {};

  const [step, setStep] = useState(0);
  const [data, setData] = useState(() => ({
    expenses: {
      housing: initial.expenses ? initial.expenses.housing || 0 : 0,
      food: initial.expenses ? initial.expenses.food || 0 : 0,
      transport: initial.expenses ? initial.expenses.transport || 0 : 0,
      subscriptions: initial.expenses ? initial.expenses.subscriptions || 0 : 0,
      other: initial.expenses ? initial.expenses.other || 0 : 0,
    },
    mortgage: {
      enabled: initial.mortgage ? !!initial.mortgage.enabled : false,
      originalAmount: initial.mortgage ? initial.mortgage.originalAmount || 0 : 0,
      termYears: initial.mortgage ? initial.mortgage.termYears || 30 : 30,
      startYear: initial.mortgage ? initial.mortgage.startYear || new Date().getFullYear() : new Date().getFullYear(),
      type: initial.mortgage ? initial.mortgage.type || 'fixed' : 'fixed',
      fixedRate: initial.mortgage ? (initial.mortgage.fixedRate != null ? initial.mortgage.fixedRate : 3.0) : 3.0,
      spread: initial.mortgage ? (initial.mortgage.spread != null ? initial.mortgage.spread : 1.0) : 1.0,
      euriborRef: initial.mortgage ? (initial.mortgage.euriborRef != null ? initial.mortgage.euriborRef : 3.0) : 3.0,
    },
    allocation: {
      cash: initial.allocation ? initial.allocation.cash || 0 : 0,
      deposits: initial.allocation ? initial.allocation.deposits || 0 : 0,
      fundsEtfs: initial.allocation ? initial.allocation.fundsEtfs || 0 : 0,
      pensionPlan: initial.allocation ? initial.allocation.pensionPlan || 0 : 0,
      other: initial.allocation ? initial.allocation.other || 0 : 0,
      customReturns: {
        deposits: initial.allocation && initial.allocation.customReturns && initial.allocation.customReturns.deposits != null
          ? initial.allocation.customReturns.deposits : 2.0,
        fundsEtfs: initial.allocation && initial.allocation.customReturns ? initial.allocation.customReturns.fundsEtfs : null,
        pensionPlan: initial.allocation && initial.allocation.customReturns ? initial.allocation.customReturns.pensionPlan : null,
        other: initial.allocation && initial.allocation.customReturns && initial.allocation.customReturns.other != null
          ? initial.allocation.customReturns.other : 0,
      },
    },
  }));

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = prev;
    };
  }, [onClose]);

  const setExpense = (k, v) => setData(d => ({ ...d, expenses: { ...d.expenses, [k]: Math.max(0, v) } }));
  const setMortgage = (patch) => setData(d => ({ ...d, mortgage: { ...d.mortgage, ...patch } }));
  const setAlloc = (k, v) => setData(d => ({ ...d, allocation: { ...d.allocation, [k]: Math.max(0, Math.min(100, v)) } }));
  const setCustomReturn = (k, v) => setData(d => ({
    ...d,
    allocation: { ...d.allocation, customReturns: { ...d.allocation.customReturns, [k]: v } },
  }));

  const totalExpenses = data.expenses.housing + data.expenses.food + data.expenses.transport
                       + data.expenses.subscriptions + data.expenses.other;
  const totalAllocation = data.allocation.cash + data.allocation.deposits + data.allocation.fundsEtfs
                        + data.allocation.pensionPlan + data.allocation.other;

  const allocOk = Math.abs(totalAllocation - 100) < 0.01;
  // Effective return preview (using same logic as the live helper)
  const effRetPreview = (() => {
    const a = data.allocation;
    const cr = a.customReturns;
    const w = a.cash + a.deposits + a.fundsEtfs + a.pensionPlan + a.other;
    if (w <= 0) return null;
    const rDep = cr.deposits != null ? cr.deposits : 2.0;
    const rFunds = cr.fundsEtfs != null ? cr.fundsEtfs : planReturn;
    const rPP = cr.pensionPlan != null ? cr.pensionPlan : planReturn;
    const rOther = cr.other != null ? cr.other : 0;
    return (0 * a.cash + rDep * a.deposits + rFunds * a.fundsEtfs + rPP * a.pensionPlan + rOther * a.other) / w;
  })();

  const totalSpendInvest = totalExpenses + investment;
  const overspending = income > 0 && totalSpendInvest > income;
  const sobrante = Math.max(0, income - totalSpendInvest);

  const finish = () => {
    // Guard against saving a corrupted allocation (e.g. residue from a previous
    // session). If the sum isn't 100, send the user back to the allocation step;
    // the in-step indicator already explains what's wrong, so no toast needed.
    const totalAlloc = data.allocation.cash + data.allocation.deposits
      + data.allocation.fundsEtfs + data.allocation.pensionPlan + data.allocation.other;
    const allocValid = Math.abs(totalAlloc - 100) < 0.01;
    if (!allocValid) {
      setStep(2);
      return;
    }
    const payload = {
      completed: true,
      expenses: data.expenses,
      mortgage: data.mortgage,
      allocation: data.allocation,
    };
    if (onComplete) {
      onComplete(payload);
    } else {
      mutatePlan(p => ({ ...p, actualLife: payload }));
    }
  };

  const canNext = (() => {
    if (step === 0) return true; // expenses always allowed (even 0)
    if (step === 1) return true; // mortgage step always allowed
    if (step === 2) return allocOk;
    return true;
  })();

  const totalSteps = 4;

  // Reusable styled bits
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(26,22,18,0.55)',
      zIndex: 1100, display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      padding: '24px 12px', overflowY: 'auto',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: T.bg, maxWidth: 640, width: '100%',
        borderRadius: 14, padding: 'clamp(22px, 4vw, 36px)',
        fontFamily: T.serif, color: T.ink,
        boxShadow: '0 24px 60px rgba(26,22,18,0.3)',
        position: 'relative',
      }}>
        <button onClick={onClose} aria-label="Cerrar"
          style={{ position: 'absolute', top: 14, right: 14, background: 'transparent', border: 'none', cursor: 'pointer', fontFamily: T.mono, fontSize: 10, color: T.faint, padding: 8, letterSpacing: '0.1em' }}>
          ✕ CERRAR
        </button>

        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.faint, marginBottom: 8 }}>
          Paso {step + 1} de {totalSteps} · Descubre más sobre tu situación
        </div>

        {/* Step 1 · Expenses */}
        {step === 0 && (
          <>
            <div style={{ fontFamily: T.display, fontSize: 'clamp(22px, 4vw, 30px)', letterSpacing: '-0.01em', lineHeight: 1.2, marginBottom: 8 }}>
              ¿Cuánto te cuesta vivir cada mes?
            </div>
            <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, lineHeight: 1.55, marginBottom: 18 }}>
              Estimación, no contabilidad. Si tienes hipoteca, mete la cuota en Vivienda.
            </div>
            <ExpenseRow k="housing" label="Vivienda" chips={[500, 800, 1200]} expenses={data.expenses} onSetExpense={setExpense} />
            <ExpenseRow k="food" label="Comida" chips={[250, 400, 600]} expenses={data.expenses} onSetExpense={setExpense} />
            <ExpenseRow k="transport" label="Transporte" chips={[0, 80, 150, 250]} expenses={data.expenses} onSetExpense={setExpense} />
            <ExpenseRow k="subscriptions" label="Suscripciones" chips={[20, 50, 100]} expenses={data.expenses} onSetExpense={setExpense} />
            <ExpenseRow k="other" label="Otros" chips={[100, 200, 400]} expenses={data.expenses} onSetExpense={setExpense} />

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', paddingTop: 14, borderTop: '1px solid ' + T.line, marginTop: 4 }}>
              <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, letterSpacing: '0.12em', textTransform: 'uppercase' }}>Total</div>
              <div style={{ fontFamily: T.display, fontSize: 28, color: T.ink, letterSpacing: '-0.01em' }}>
                {fmtEur(totalExpenses)}<span style={{ fontSize: 14, color: T.muted, marginLeft: 4 }}>/mes</span>
                {income > 0 && (
                  <span style={{ fontSize: 13, color: T.muted, marginLeft: 10, fontFamily: T.serif, fontStyle: 'italic' }}>
                    {Math.round(totalExpenses / income * 100)}% de tu sueldo
                  </span>
                )}
              </div>
            </div>

            {overspending && (
              <div style={{ marginTop: 14, padding: '10px 14px', background: 'rgba(180,83,9,0.08)', border: '1px solid ' + T.amber, borderRadius: 10, fontFamily: T.serif, fontStyle: 'italic', fontSize: 13, color: T.amber, lineHeight: 1.5 }}>
                Estás declarando más gasto+inversión que ingresos. Revisa los importes o tu ingreso en Ajustes.
              </div>
            )}

            <OnboardingHelp title="¿Por qué estas categorías?">
              No necesitas precisión contable. Una estimación razonable es suficiente. Mi Plan FIRE compara tu gasto declarado con tu salario neto y te muestra dónde va tu dinero, no audita tu vida. Si no llegas a fin de mes con lo que pones, sabremos que falta algo.
            </OnboardingHelp>
          </>
        )}

        {/* Step 2 · Mortgage */}
        {step === 1 && (
          <>
            <div style={{ fontFamily: T.display, fontSize: 'clamp(22px, 4vw, 30px)', letterSpacing: '-0.01em', lineHeight: 1.2, marginBottom: 8 }}>
              ¿Tienes hipoteca?
            </div>
            <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, lineHeight: 1.55, marginBottom: 18 }}>
              La cuota mensual ya está en "Vivienda" del paso anterior. Aquí solo es para mostrarte cuánto pagas en intereses a lo largo del plazo.
            </div>

            <div style={{ display: 'flex', gap: 8, marginBottom: 18 }}>
              <button onClick={() => setMortgage({ enabled: false })} style={{
                flex: 1, fontFamily: T.mono, fontSize: 11, padding: '14px 16px',
                background: !data.mortgage.enabled ? T.ink : 'transparent',
                color: !data.mortgage.enabled ? T.bg : T.muted,
                border: '1px solid ' + (!data.mortgage.enabled ? T.ink : T.line),
                borderRadius: 12, cursor: 'pointer', letterSpacing: '0.1em', textTransform: 'uppercase',
              }}>No, no tengo</button>
              <button onClick={() => setMortgage({ enabled: true })} style={{
                flex: 1, fontFamily: T.mono, fontSize: 11, padding: '14px 16px',
                background: data.mortgage.enabled ? T.ink : 'transparent',
                color: data.mortgage.enabled ? T.bg : T.muted,
                border: '1px solid ' + (data.mortgage.enabled ? T.ink : T.line),

            </div>

                <Row label="Importe financiado">

                </Row>
                <Row label="Plazo total">

                </Row>
                <Row label="Año de inicio">
                  <span style={{ fontFamily: T.display, fontSize: 22 }}>
                    <EditableNumber value={data.mortgage.startYear} onChange={(v) => setMortgage({ startYear: v })} min={1990} max={new Date().getFullYear() + 5} step={1} color={T.ink} />

                <div style={{ display: 'flex', gap: 8 }}>

                    background: data.mortgage.type === 'fixed' ? T.ink : 'transparent',

                  <button onClick={() => setMortgage({ type: 'variable' })} style={{

                    color: data.mortgage.type === 'variable' ? T.bg : T.muted,
                    border: '1px solid ' + (data.mortgage.type === 'variable' ? T.ink : T.line),

                </div>
                {data.mortgage.type === 'fixed' ? (

                    <span style={{ fontFamily: T.display, fontSize: 22 }}>
                      <EditableNumber value={data.mortgage.fixedRate} onChange={(v) => setMortgage({ fixedRate: v })} min={0} max={15} step={0.1} color={T.ink} /> %
                    </span>
                  </Row>
                ) : (
                  <>
                    <Row label="Euribor referencia">
                      <span style={{ fontFamily: T.display, fontSize: 22 }}>
                        <EditableNumber value={data.mortgage.euriborRef} onChange={(v) => setMortgage({ euriborRef: v })} min={0} max={10} step={0.1} color={T.ink} /> %
                      </span>

                    <Row label="Spread sobre Euribor">
                      <span style={{ fontFamily: T.display, fontSize: 22 }}>
                        <EditableNumber value={data.mortgage.spread} onChange={(v) => setMortgage({ spread: v })} min={0} max={5} step={0.05} color={T.ink} /> %
                      </span>
                    </Row>
                    <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, lineHeight: 1.5 }}>

                    </div>
                  </>
