// ============================================================
// Lifecycle chart — accumulation + decumulation in one view
// X axis: age from current age → lifeExpectancy
// Two visual phases: building (green/accent area) + drawdown (faded area)
// Vertical reference line at retire age
// ============================================================
function LifecycleChart({ plan, profile, d, realMode, inflRate, height = 280 }) {
  const R = window.Recharts || {};
  const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine } = R;

  // Build combined series — each row has both `accum` and `decum` fields
  // so Recharts renders them as separate areas with the right color.
  const series = useMemo(() => {
    const accum = d.seriesPlan || [];
    const decum = d.seriesDecum || [];
    const accumYears = profile.retireAge - profile.age;
    const totalMonths = accum.length + Math.max(0, decum.length - 1);
    const out = [];
    // Sample every quarter to keep series light
    const stride = 3;
    for (let i = 0; i < accum.length; i += stride) {
      const p = accum[i];
      const months = i;
      const portfolio = realMode ? toRealEur(p.portfolio, months, inflRate) : p.portfolio;
      out.push({
        monthIndex: months,
        age: profile.age + months / 12,
        accum: portfolio,
        decum: null,
      });
    }
    // Connector point: bridge with both series at retire age
    if (accum.length > 0 && decum.length > 0) {
      const bridgeMonth = accum.length - 1;
      const bridgePortfolio = realMode ? toRealEur(accum[bridgeMonth].portfolio, bridgeMonth, inflRate) : accum[bridgeMonth].portfolio;
      out.push({
        monthIndex: bridgeMonth,
        age: profile.retireAge,
        accum: bridgePortfolio,
        decum: bridgePortfolio,
      });
    }
    // Decumulation phase: months continue from retire
    for (let i = 1; i < decum.length; i += stride) {
      const months = accum.length - 1 + i;
      const portfolio = realMode ? toRealEur(decum[i].portfolio, months, inflRate) : decum[i].portfolio;
      out.push({
        monthIndex: months,
        age: profile.retireAge + i / 12,
        accum: null,
        decum: portfolio,
      });
    }
    return out;
  }, [d.seriesPlan, d.seriesDecum, profile.age, profile.retireAge, realMode, inflRate]);

  if (!ResponsiveContainer || !series.length) return null;

  // X ticks: every 5 or 10 years
  const lifeExp = plan.lifeExpectancy || 90;
  const span = lifeExp - profile.age;
  const step = span > 40 ? 10 : 5;
  const tickAges = [];
  for (let a = Math.ceil(profile.age / step) * step; a <= lifeExp; a += step) {
    tickAges.push(a);
  }
  // Find closest monthIndex for each tick age
  const tickIndices = tickAges.map((a) => {
    const m = Math.round((a - profile.age) * 12);
    // Find nearest point in series
    let best = series[0], bestDiff = Math.abs(series[0].monthIndex - m);
    for (const p of series) {
      const diff = Math.abs(p.monthIndex - m);
      if (diff < bestDiff) { best = p; bestDiff = diff; }
    }
    return best.monthIndex;
  });

  const retireMonthIdx = (profile.retireAge - profile.age) * 12;

  return (
    <div style={{ width: '100%', height }}>
      <ResponsiveContainer>
        <AreaChart data={series} margin={{ top: 10, right: 12, left: 0, bottom: 6 }}>
          <defs>
            <linearGradient id="accumGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={T.accent} stopOpacity={0.30} />
              <stop offset="100%" stopColor={T.accent} stopOpacity={0.04} />
            </linearGradient>
            <linearGradient id="decumGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={T.muted} stopOpacity={0.22} />
              <stop offset="100%" stopColor={T.muted} stopOpacity={0.02} />
            </linearGradient>
          </defs>
          <CartesianGrid stroke={T.lineSoft} strokeDasharray="2 4" vertical={false} />
          <XAxis
            dataKey="monthIndex"
            ticks={tickIndices}
            tickFormatter={(v) => {
              const row = series.find(s => s.monthIndex === v);
              return row ? Math.round(row.age) + '' : '';
            }}
            tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 9 }}
            axisLine={{ stroke: T.line }}
            tickLine={false}
          />
          <YAxis
            tickFormatter={fmtEur}
            tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 9 }}
            axisLine={false}
            tickLine={false}
            width={56}
          />
          <Tooltip
            formatter={(value, name) => {
              if (value == null) return [null, null];
              const labels = { accum: 'Acumulando', decum: 'Retirando' };
              return [fmtEur(value), labels[name] || name];
            }}
            labelFormatter={(v) => {
              const row = series.find(s => s.monthIndex === v);
              return row ? `${Math.round(row.age)} años` : '';
            }}
            contentStyle={{ background: T.ink, border: 'none', borderRadius: 6, fontFamily: T.mono, fontSize: 11, color: '#fff', padding: '6px 10px' }}
            labelStyle={{ color: 'rgba(255,255,255,0.6)', fontSize: 10, marginBottom: 4 }}
            itemStyle={{ color: '#fff' }}
          />
          <ReferenceLine
            x={retireMonthIdx}
            stroke={T.accent}
            strokeWidth={1}
            strokeDasharray="4 4"
            label={{
              value: `${profile.retireAge}`,
              position: 'top',
              fill: T.accent,
              fontFamily: T.mono,
              fontSize: 10,
            }}
          />
          <Area type="monotone" dataKey="accum" stroke={T.accent} strokeWidth={2} fill="url(#accumGrad)" isAnimationActive={false} connectNulls={false} />
          <Area type="monotone" dataKey="decum" stroke={T.muted} strokeWidth={1.6} strokeDasharray="3 3" fill="url(#decumGrad)" isAnimationActive={false} connectNulls={false} />
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// ============================================================
// Retirement income card — what happens after you stop working
// ============================================================
function RetirementCard({ plan, profile, d, realMode, inflRate }) {
  const withdrawalRate = plan.withdrawalRate != null ? plan.withdrawalRate : 4.0;
  const lifeExp = plan.lifeExpectancy || 90;
  const yearsInRetirement = lifeExp - profile.retireAge;

  const pen = plan.publicPension || { enabled: false };
  const pensionEnabled = pen.enabled && (pen.monthlyAmount || 0) > 0;
  const pensionMonthlyNominal = pensionEnabled ? pen.monthlyAmount : 0;
  const pensionStartAge = pen.startAge || 67;

  // The year-1 monthly withdrawal in nominal euros
  const monthlyIncomeNominal = d.retirementMonthlyIncome || 0;
  // Convert to today's euros (months between today and retire date)
  const monthsToRetire = (profile.retireAge - profile.age) * 12;
  const monthlyIncomeReal = toRealEur(monthlyIncomeNominal, monthsToRetire, inflRate);
  // Show in the user's selected mode
  const showMonthlyIncome = realMode ? monthlyIncomeReal : monthlyIncomeNominal;

  // Pension at start age in real (today's) euros
  const monthsToPension = (pensionStartAge - profile.age) * 12;
  const pensionReal = toRealEur(pensionMonthlyNominal, monthsToPension, inflRate);
  const showPension = realMode ? pensionReal : pensionMonthlyNominal;

  // Combined monthly income (when pension is active)
  // If pension starts at retire age: combined from year 1
  // If pension starts later: portfolio first, then portfolio + pension
  const pensionAtRetire = pensionStartAge <= profile.retireAge ? pensionMonthlyNominal : 0;
  const totalAtRetireNominal = monthlyIncomeNominal + pensionAtRetire;
  const totalAtRetireReal = toRealEur(totalAtRetireNominal, monthsToRetire, inflRate);
  const showTotalAtRetire = realMode ? totalAtRetireReal : totalAtRetireNominal;

  // Final portfolio at life-end (legacy / herencia)
  const finalPortfolioNominal = d.portfolioAtLifeEnd || 0;
  const totalMonthsToEnd = (lifeExp - profile.age) * 12;
  const finalPortfolioReal = toRealEur(finalPortfolioNominal, totalMonthsToEnd, inflRate);
  const showFinalPortfolio = realMode ? finalPortfolioReal : finalPortfolioNominal;

  const depletedAge = d.depletedAtAge;
  const willDeplete = depletedAge != null && depletedAge < lifeExp;

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, flexWrap: 'wrap', marginBottom: 14 }}>
        <div>
          <Label>Tu retiro · {profile.retireAge} a {lifeExp} años</Label>
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 4, lineHeight: 1.5 }}>
            <Concept id="regla-4">Regla del <strong style={{ color: T.ink, fontStyle: 'normal' }}>{withdrawalRate}%</strong></Concept> de Bengen: retiras ese porcentaje el primer año, luego lo ajustas por <Concept id="inflacion">inflación</Concept> cada año.
            {pensionEnabled && <> + pensión pública desde los <strong style={{ color: T.ink, fontStyle: 'normal' }}>{pensionStartAge}</strong>.</>}
          </div>
        </div>
      </div>

      {/* Income breakdown: portfolio + pension */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 12, marginBottom: 14 }}>
        <div style={{ padding: '12px 14px', background: T.panel, borderRadius: 10, border: '1px solid ' + T.line }}>
          <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>
            De tu cartera
          </div>
          <div style={{ fontFamily: T.display, fontSize: 24, color: T.accent, letterSpacing: '-0.01em' }}>
            {fmtEur(showMonthlyIncome)}
          </div>
          <div style={{ fontFamily: T.mono, fontSize: 8, color: T.faint, marginTop: 4, letterSpacing: '0.04em' }}>
            {withdrawalRate}% × patrimonio jubilación
          </div>
        </div>

        {pensionEnabled && (
          <div style={{ padding: '12px 14px', background: T.panel, borderRadius: 10, border: '1px solid ' + T.line }}>
            <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>
              Pensión pública
            </div>
            <div style={{ fontFamily: T.display, fontSize: 24, color: T.green, letterSpacing: '-0.01em' }}>
              {fmtEur(showPension)}
            </div>
            <div style={{ fontFamily: T.mono, fontSize: 8, color: T.faint, marginTop: 4, letterSpacing: '0.04em' }}>
              desde {pensionStartAge} años
            </div>
          </div>
        )}

        <div style={{ padding: '12px 14px', background: T.ink, color: T.bg, borderRadius: 10 }}>
          <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.55)', marginBottom: 6 }}>
            Total al jubilarte
          </div>
          <div style={{ fontFamily: T.display, fontSize: 28, letterSpacing: '-0.01em' }}>
            {fmtEur(showTotalAtRetire)}
          </div>
          <div style={{ fontFamily: T.mono, fontSize: 8, color: 'rgba(255,255,255,0.45)', marginTop: 4, letterSpacing: '0.04em' }}>
            {realMode ? `${fmtEur(totalAtRetireNominal)} con inflación` : `${fmtEur(totalAtRetireReal)} sin inflación`}
          </div>
        </div>
      </div>

      {/* Depletion / final patrimony */}
      <div style={{ padding: '10px 14px', background: willDeplete ? 'rgba(185,28,28,0.08)' : 'rgba(21,128,61,0.06)',
        border: '1px solid ' + (willDeplete ? T.red : T.green), borderRadius: 10, display: 'flex',
        flexDirection: 'row', alignItems: 'center', gap: 10, flexWrap: 'wrap', justifyContent: 'space-between' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {willDeplete ? (
            <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 13, color: T.red, lineHeight: 1.4 }}>
              ⚠ La cartera se agotaría a los <strong style={{ fontStyle: 'normal' }}>{Math.round(depletedAge)}</strong>. Faltarían {Math.round(lifeExp - depletedAge)} años hasta tu esperanza de vida.
              {pensionEnabled && <> La pensión seguiría pagando {fmtEur(pensionMonthlyNominal)}/mes pero sin colchón.</>}
            </div>
          ) : (
            <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 13, color: T.green, lineHeight: 1.4 }}>
              ✓ A los {lifeExp} aún tendrás <strong style={{ fontStyle: 'normal', color: T.green }}>{fmtEur(showFinalPortfolio)}</strong>. Herencia o colchón si vives más.
            </div>
          )}
        </div>
      </div>

      <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 11, color: T.faint, marginTop: 12, lineHeight: 1.5, paddingTop: 12, borderTop: '1px dashed ' + T.lineSoft }}>
        Nota: proyección determinista (retorno constante {plan.annualReturn}%, sin riesgo de secuencia de retornos). Bengen 2025 sube SAFEMAX histórico a 4.7%; Morningstar 2026 baja forward-looking a 3.9%. El simulador oficial de la Seguridad Social estará siempre más afinado para la pensión real.
      </div>
    </Card>
  );
}


// ============================================================
// Monte Carlo card — sequence of returns risk visualized
// Shows probability of success + spread band (p10/p50/p90)
// ============================================================
function MonteCarloCard({ plan, profile, d, realMode, inflRate }) {
  const { state, update } = useStore();
  const isPro = !!state.isPro;
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  // Sequence-of-returns mode: 'random' (default), 'early-crash', 'late-crash'.
  // Re-runs the simulation when changed; included in inputsKey so the useEffect picks it up.
  // In free mode this stays locked to 'random' (the SoR toggle is gated to Pro).
  const [sequenceMode, setSequenceMode] = useState('random');
  // Whenever Pro is turned off, reset the SoR mode to keep the free view honest.
  useEffect(() => {
    if (!isPro && sequenceMode !== 'random') setSequenceMode('random');
  }, [isPro]);

  // Inputs that drive a re-run
  const inputsKey = useMemo(() => JSON.stringify({
    cap: d.currentPortfolio,
    ret: plan.annualReturn,
    inf: plan.inflationRate,
    wd: plan.withdrawalRate,
    le: plan.lifeExpectancy,
    age: profile.age,
    retAge: profile.retireAge,
    aporte: currentMonthlyAporte(plan),
    pen: plan.publicPension,
    seq: sequenceMode,
  }), [d.currentPortfolio, plan, profile, sequenceMode]);

  // Run MC when inputs change (debounced, async via timeout)
  useEffect(() => {
    let cancelled = false;
    setRunning(true);
    setError(null);
    const timer = setTimeout(() => {
      try {
        const mc = runMonteCarlo(plan, profile, {
          trials: 500,
          startCapital: d.currentPortfolio,
          sequenceMode,
        });
        if (!cancelled) {
          setResult(mc);
          setRunning(false);
        }
      } catch (e) {
        if (!cancelled) {
          setError(String(e.message || e));
          setRunning(false);
        }
      }
    }, 100);
    return () => { cancelled = true; clearTimeout(timer); };
  }, [inputsKey]);

  // Build chart data: ages mapped to p10/p25/p50/p75/p90 values, optionally converted to real
  const chartData = useMemo(() => {
    if (!result) return [];
    return result.percentiles.map((row, y) => {
      const monthsFromNow = y * 12;
      const conv = (v) => realMode ? toRealEur(v, monthsFromNow, inflRate) : v;
      return {
        age: profile.age + y,
        p10: conv(row.p10),
        p25: conv(row.p25),
        p50: conv(row.p50),
        p75: conv(row.p75),
        p90: conv(row.p90),
        // Pre-computed band ribbons so Recharts can render them as stacked areas.
        // outerSpan: from p10 to p90 (full plausible range, 80% central).
        // innerSpan: from p25 to p75 (probable range, 50% central).
        outerLow: conv(row.p10),
        outerSpan: conv(row.p90) - conv(row.p10),
        innerLow: conv(row.p25),
        innerSpan: conv(row.p75) - conv(row.p25),
      };
    });
  }, [result, realMode, inflRate, profile.age]);

  // Build clean 5- or 10-year ticks for the X axis.
  // Must run before any early return so hook order stays stable across renders.
  const ageTicks = useMemo(() => {
    if (chartData.length === 0) return [];
    const ageMin = chartData[0].age;
    const ageMax = chartData[chartData.length - 1].age;
    const range = ageMax - ageMin;
    const step = range > 40 ? 10 : 5;
    const out = [];
    for (let a = Math.ceil(ageMin / step) * step; a <= ageMax; a += step) out.push(a);
    return out;
  }, [chartData]);

  if (running && !result) {
    return (
      <Card>
        <Label>Probabilidad de éxito</Label>
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, marginTop: 12, lineHeight: 1.5 }}>
          Simulando 500 escenarios de mercado...
        </div>
      </Card>
    );
  }

  if (error) {
    return (
      <Card>
        <Label>Probabilidad de éxito</Label>
        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.red, marginTop: 10 }}>
          Error: {error}
        </div>
      </Card>
    );
  }

  if (!result) return null;

  const successPct = Math.round(result.successRate * 100);
  const successColor = successPct >= 90 ? T.green : successPct >= 75 ? T.amber : T.red;
  const successZone = successPct >= 90 ? 'Excelente' : successPct >= 75 ? 'Aceptable' : successPct >= 50 ? 'Frágil' : 'Crítico';

  // Highlight values at retire age
  const retireRow = chartData.find(row => row.age === profile.retireAge) || chartData[result.yearsAccum];

  const R = window.Recharts || {};
  const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, Line, ComposedChart, ReferenceLine } = R;

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, flexWrap: 'wrap', marginBottom: 14 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <Label>Probabilidad de éxito</Label>
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 4, lineHeight: 1.5 }}>
            {isPro
              ? <>{result.trials} <Concept id="monte-carlo">simulaciones</Concept> de tu plan completo. El % de éxito resume el resultado pero esconde la asimetría: leerlo solo es engañoso. Mira las bandas del gráfico y, sobre todo, lo que dice "Si el plan falla" al final.</>
              : <>{result.trials} <Concept id="monte-carlo">simulaciones</Concept> de tu plan completo, con volatilidad de mercado. El % de éxito resume el resultado pero esconde la asimetría: las bandas del gráfico te enseñan el rango plausible de futuros.</>
            }
          </div>
        </div>
        <div style={{
          padding: '12px 18px', background: successColor, color: '#fff',
          borderRadius: 12, textAlign: 'center', flexShrink: 0,
        }}>
          <div style={{ fontFamily: T.display, fontSize: 36, lineHeight: 1, letterSpacing: '-0.02em' }}>{successPct}%</div>
          <div style={{ fontFamily: T.mono, fontSize: 8, letterSpacing: '0.14em', textTransform: 'uppercase', opacity: 0.85, marginTop: 4 }}>{successZone}</div>
        </div>
      </div>

      {/* Sequence-of-returns toggle: Pro-only. Free users see the random baseline.
          Lets the user isolate the SoR risk explicitly. */}
      {isPro && (
        <>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap', marginBottom: 10 }}>
            <span style={{ fontFamily: T.mono, fontSize: 9, color: T.muted, letterSpacing: '0.12em', textTransform: 'uppercase', marginRight: 4 }}>Secuencia de retornos:</span>
            {['random', 'early-crash', 'late-crash'].map((mode) => (
              <button
                key={mode}
                onClick={() => setSequenceMode(mode)}
                style={{
                  padding: '3px 8px',
                  background: sequenceMode === mode ? T.accent : 'transparent',
                  color: sequenceMode === mode ? '#fff' : T.muted,
                  border: '1px solid ' + (sequenceMode === mode ? T.accent : T.line),
                  borderRadius: 4,
                  cursor: 'pointer',
                  fontFamily: T.mono,
                  fontSize: 10,
                  letterSpacing: '0.06em',
                  textTransform: 'uppercase',
                }}>
                {mode === 'random' ? 'Aleatoria' : mode === 'early-crash' ? 'Caída temprana' : 'Caída tardía'}
              </button>
            ))}
          </div>
          {sequenceMode !== 'random' && (
            <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginBottom: 12, lineHeight: 1.5 }}>
              {sequenceMode === 'early-crash'
                ? `Forzando los 5 peores años en el inicio del retiro (${profile.retireAge}-${profile.retireAge + 4}). El "riesgo de secuencia de retornos" descrito por Bengen: una mala racha al principio del retiro hace mucho más daño que la misma mala racha al final.`
                : `Forzando los 5 peores años al final del plan (${(plan.lifeExpectancy || 90) - 5}-${(plan.lifeExpectancy || 90) - 1}). Una caída tardía deja poco tiempo para recuperar, pero el daño absoluto es menor porque ya queda menos plan por delante.`
              }
            </div>
          )}
        </>
      )}

      {/* Intro phrase — sets reading frame for the chart */}
      <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 14, color: T.muted, lineHeight: 1.55, marginBottom: 12 }}>
        Cada línea es un futuro posible. Cada futuro asume retornos aleatorios año a año en torno a tu media histórica. Lo importante no es la línea exacta, sino en qué porcentaje de futuros tu patrimonio cubre la meta.
      </div>

      {ResponsiveContainer && chartData.length > 1 && (
        <div style={{ width: '100%', height: 220, marginBottom: 6 }}>
          <ResponsiveContainer>
            <ComposedChart data={chartData} margin={{ top: 6, right: 8, left: 8, bottom: 22 }}>
              <defs>
                {/* Two stacked-area ribbons sharing the accent colour but with
                    different opacities. The inner one (p25-p75) is the "probable
                    range" — 50% of futures live here. The outer one (p10-p90) is
                    the "plausible range" — 80% of futures. */}
                <linearGradient id="mcbandOuter" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={T.accent} stopOpacity={0.10} />
                  <stop offset="100%" stopColor={T.accent} stopOpacity={0.04} />
                </linearGradient>
                <linearGradient id="mcbandInner" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={T.accent} stopOpacity={0.26} />
                  <stop offset="100%" stopColor={T.accent} stopOpacity={0.14} />
                </linearGradient>
              </defs>
              <CartesianGrid stroke={T.lineSoft} strokeDasharray="2 4" vertical={false} />
              <XAxis
                dataKey="age"
                type="number"
                domain={['dataMin', 'dataMax']}
                ticks={ageTicks.length > 0 ? ageTicks : undefined}
                tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 9 }}
                axisLine={{ stroke: T.line }}
                tickLine={false}
                label={{ value: 'Edad', position: 'insideBottom', offset: -6, fill: T.muted, fontFamily: T.mono, fontSize: 10, letterSpacing: '0.1em' }}
              />
              <YAxis
                tickFormatter={fmtEur}
                tick={{ fill: T.faint, fontFamily: T.mono, fontSize: 9 }}
                axisLine={false}
                tickLine={false}
                width={64}
                label={{ value: realMode ? 'Patrimonio (€ sin inflación)' : 'Patrimonio (€)', angle: -90, position: 'insideLeft', offset: 10, fill: T.muted, fontFamily: T.mono, fontSize: 10, letterSpacing: '0.08em', style: { textAnchor: 'middle' } }}
              />
              <Tooltip
                formatter={(value, name) => {
                  const labels = {
                    p10: 'p10 (10% peor)',
                    p25: 'p25',
                    p50: 'Mediana (p50)',
                    p75: 'p75',
                    p90: 'p90 (10% mejor)',
                  };
                  // Suppress the band ribbons in the tooltip — they would show
                  // confusing "outerLow / outerSpan / innerLow / innerSpan" rows.
                  if (name === 'outerLow' || name === 'outerSpan' || name === 'innerLow' || name === 'innerSpan') return null;
                  return [fmtEur(value), labels[name] || name];
                }}
                labelFormatter={(age) => `${Math.round(age)} años`}

function HouseholdSummaryCard() {
  const { accounts, activeAccountId, switchAccount } = useStore();
  const list = useMemo(() => Object.values(accounts || {}), [accounts]);
  if (list.length < 2) return null;

  const today = todayKey();
  const aggregates = useMemo(() => list.map((a) => {
    const state = a.state || {};
    const plan = state.plan || {};
    const profile = state.profile || {};

    // Patrimony estimation: capital + recorded actuals (does not include compound growth on past — approximation)
    const months = state.months || [];
    const totalActual = months.reduce((s, m) => s + (m.actual || 0), 0);
    const capital = plan.capital || 0;
    const portfolio = capital + totalActual;

    const income = computeIncomeFor(plan, today);
    const investment = computePlannedFor(plan, today);

    return { id: a.id, label: a.label, name: profile.name, portfolio, income, investment };
  }), [list]);

  const totalPortfolio = aggregates.reduce((s, a) => s + a.portfolio, 0);
  const totalIncome = aggregates.reduce((s, a) => s + a.income, 0);
  const totalInvestment = aggregates.reduce((s, a) => s + a.investment, 0);
  const householdRate = totalIncome > 0 ? totalInvestment / totalIncome : 0;

  return (
    <Card style={{ background: T.ink, color: T.bg, border: '1px solid ' + T.ink }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, marginBottom: 12, flexWrap: 'wrap' }}>

          <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)' }}>

          <div style={{ fontFamily: T.display, fontSize: 'clamp(28px, 5.5vw, 40px)', letterSpacing: '-0.015em', marginTop: 4, lineHeight: 1.05 }}>
            {fmtEur(totalPortfolio)}

        <div>
          <div style={{ fontFamily: T.mono, fontSize: 8, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)', marginBottom: 4 }}>Ingreso conjunto</div>
          <div style={{ fontFamily: T.display, fontSize: 'clamp(16px, 3.4vw, 22px)', letterSpacing: '-0.01em' }}>
            {fmtEur(totalIncome)}
          </div>
        </div>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 8, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)', marginBottom: 4 }}>Inversión conjunta</div>
          <div style={{ fontFamily: T.display, fontSize: 'clamp(16px, 3.4vw, 22px)', letterSpacing: '-0.01em', color: '#86efac' }}>

function MonthlyFlowCard({ plan, profile }) {
  const { state } = useStore();
  const tk = todayKey();
  const income = sumActiveSegments(plan.incomeSegments, tk);
  const bonus = sumActiveSegments(plan.bonusSegments, tk);
  const totalIncome = income + bonus;
  const planAporte = computePlannedFor(plan, tk);
  const planRate = totalIncome > 0 ? planAporte / totalIncome : 0;
  const planLife = Math.max(0, totalIncome - planAporte);

  // Real value from current month if registered
  const currentMonth = (state.months || []).find(m => m.key === tk);
  const realAporte = currentMonth && currentMonth.actual != null ? currentMonth.actual : null;
  const realRate = realAporte != null && totalIncome > 0 ? realAporte / totalIncome : null;
  const realLife = realAporte != null ? Math.max(0, totalIncome - realAporte) : null;
  const delta = realAporte != null ? realAporte - planAporte : null;

  if (totalIncome === 0) {
    return (
      <Card>
        <Label>Tu mes</Label>
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, marginTop: 12, lineHeight: 1.5 }}>
          Define tu ingreso en <strong style={{ color: T.ink, fontStyle: 'normal' }}>Ajustes → Tramos de ingreso</strong> para ver el flujo.
        </div>
      </Card>
    );
  }

  const monthLabel = readableMonth(tk);

  // Color the rate by category (green = vamos bien, amber = baja)
  const rateColor = (r) => r >= 0.20 ? T.green : r >= 0.10 ? T.ink : T.amber;

  const FlowBar = ({ aporte, life, rate, label, accent }) => (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6, gap: 8 }}>
        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, letterSpacing: '0.12em', textTransform: 'uppercase' }}>{label}</div>
        <div style={{ fontFamily: T.mono, fontSize: 11, color: rateColor(rate), letterSpacing: '0.08em', fontWeight: 600 }}>
          {(rate * 100).toFixed(0)}% inversión
        </div>
      </div>
      <div style={{ display: 'flex', height: 34, borderRadius: 8, overflow: 'hidden', border: '1px solid ' + T.line }}>
        <div style={{
          width: (rate * 100).toFixed(1) + '%',
          background: T.green, color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: T.mono, fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase',
          minWidth: 0, overflow: 'hidden', whiteSpace: 'nowrap',
        }}>
          {rate > 0.12 ? fmtEur(aporte) : ''}
        </div>
        <div style={{
          width: (100 - rate * 100).toFixed(1) + '%',
          background: T.panel, color: T.ink,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: T.mono, fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase',
          minWidth: 0, overflow: 'hidden', whiteSpace: 'nowrap',
        }}>
          {rate < 0.85 ? fmtEur(life) : ''}
        </div>
      </div>
    </div>
  );

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, flexWrap: 'wrap', marginBottom: 14 }}>
        <div>
          <Label>Tu mes · {monthLabel}</Label>
          <div style={{ fontFamily: T.display, fontSize: 'clamp(24px, 4.4vw, 32px)', letterSpacing: '-0.01em', marginTop: 4, lineHeight: 1.1 }}>
            {fmtEur(totalIncome)}<span style={{ fontSize: 16, color: T.muted, fontFamily: T.display }}> /mes ingreso</span>
          </div>
          {bonus > 0 && (
            <div style={{ fontFamily: T.mono, fontSize: 10, color: T.faint, marginTop: 4, letterSpacing: '0.05em' }}>
              {fmtEur(income)} base + {fmtEur(bonus)} complementos
            </div>
          )}
        </div>
      </div>

      <FlowBar aporte={planAporte} life={planLife} rate={planRate} label="Plan" />

      {realAporte != null ? (
        <>
          <FlowBar aporte={realAporte} life={realLife} rate={realRate} label="Real" />
          <div style={{
            marginTop: 6, padding: '8px 12px',
            background: delta >= 0 ? 'rgba(21,128,61,0.06)' : 'rgba(180,83,9,0.06)',
            border: '1px solid ' + (delta >= 0 ? T.green : T.amber),

            fontFamily: T.serif, fontStyle: 'italic', fontSize: 13, lineHeight: 1.4,

        </div>
      )}

function FlowTimelineCard({ plan, profile }) {
  // Stack inversión + vives along the years
  const series = useMemo(() => {
    const out = [];
    const startKey = todayKey();
    const months = Math.max(0, Math.round((profile.retireAge - profile.age) * 12));
    for (let m = 0; m <= months; m += 3) { // quarterly resolution
      const key = addMonthsKey(startKey, m);
      const income = computeIncomeFor(plan, key);
      const invest = computePlannedFor(plan, key);
      const life = Math.max(0, income - invest);
      out.push({
        monthIndex: m,
        age: profile.age + m / 12,
        income, invest, life,
      });
    }
    return out;
  }, [plan.incomeSegments, plan.bonusSegments, plan.savingSegments, profile.age, profile.retireAge]);

  const R = window.Recharts || {};
  const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = R;

  if (!series.length || series.every(s => s.income === 0)) return null;
  if (!ResponsiveContainer) return null;

  const startAge = profile.age;
  const endAge = profile.retireAge;
  const span = endAge - startAge;
  const step = span > 25 ? 10 : span > 10 ? 5 : 2;
  const tickIndices = [];
  for (let a = Math.ceil(startAge); a <= endAge; a += step) {
    const idx = Math.round((a - startAge) / span * (series.length - 1));
    tickIndices.push(idx);
  }

  // Final-month aggregate for header context
  const last = series[series.length - 1];
  const first = series[0];
  const lifetimeInvest = series.reduce((s, p) => s + p.invest, 0) * 3; // *3 because quarterly samples
  const lifetimeIncome = series.reduce((s, p) => s + p.income, 0) * 3;

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', flexWrap: 'wrap', gap: 8, marginBottom: 10 }}>
        <div>
          <Label>Cómo se reparte tu ingreso en el tiempo</Label>
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 4, lineHeight: 1.4 }}>
            De {fmtEur(first.income)}/mes a {fmtEur(last.income)}/mes. A lo largo de {Math.round(span)} años, vas a invertir <strong style={{ color: T.green, fontStyle: 'normal' }}>{fmtEur(lifetimeInvest)}</strong> de un total bruto de {fmtEur(lifetimeIncome)}.
          </div>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 14, fontFamily: T.mono, fontSize: 9, color: T.muted, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8, flexWrap: 'wrap' }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
          <span style={{ width: 10, height: 10, borderRadius: 2, background: T.green, display: 'inline-block' }}></span>
          Inversión
        </span>

// ============================================================
// Financial health / "lección del compuesto" + FI clock
// ============================================================
function FinancialHealthCard({ plan, profile, d }) {
  const tk = todayKey();
  const income = computeIncomeFor(plan, tk);
  const investment = computePlannedFor(plan, tk);
  // When the user has completed the "Antes de Mi Plan" mini-onboarding, use
  // declared expenses as the basis for monthly life cost (more honest than the
  // income−investment derivation, which silently absorbs anything unspent).
  // Otherwise fall back to the v4 derivation.
  const al = plan.actualLife;
  const useDeclaredExpenses = !!(al && al.completed);
  const declaredExpenses = useDeclaredExpenses ? sumExpenses(al) : 0;
  const monthlyLife = useDeclaredExpenses
    ? declaredExpenses
    : Math.max(0, income - investment);
  const rate = income > 0 ? investment / income : 0;

  // Passive income at current capital (annual return / 12)
  const passiveMonthly = (d.currentPortfolio || 0) * ((plan.annualReturn || 0) / 100) / 12;
  // What fraction of your current life this passive income covers
  const passiveCovers = monthlyLife > 0 ? passiveMonthly / monthlyLife : 0;

  // Public pension reduces the gap that the portfolio needs to fill —
  // but only ONCE the user reaches the legal retirement age. Counting a
  // future pension against today's gap collapses fiTarget to 0 and used to
  // light up "¡Ya!" for users decades away from their pension.
  const pen = plan.publicPension || { enabled: false };
  const pensionMonthly = pen.enabled ? (pen.monthlyAmount || 0) : 0;
  const pensionStartAge = pen.startAge || 67;
  const pensionActive = pen.enabled && profile.age >= pensionStartAge;
  const pensionNotYetActive = pen.enabled && profile.age < pensionStartAge;
  const effectivePensionForFI = pensionActive ? pensionMonthly : 0;
  const monthlyGap = Math.max(0, monthlyLife - effectivePensionForFI);

  // FI target with pension awareness:
  //  - Active pension covers €X/mes
  //  - Portfolio must cover the rest using configured withdrawal rate
  //  - Needed capital = monthlyGap * 12 / (withdrawalRate/100)
  const withdrawalRate = plan.withdrawalRate != null ? plan.withdrawalRate : 4.0;
  const fiTarget = monthlyGap > 0 ? monthlyGap * 12 / (withdrawalRate / 100) : 0;

  // Years to FI: find when seriesPlan portfolio >= fiTarget.
  // When fiTarget collapses to 0 we still need to be honest: if the only reason
  // is that the future pension covers everything, IF arrives the day the
  // pension kicks in, not today.
  const ageAtFI = useMemo(() => {
    if (fiTarget <= 0) {
      if (pensionActive && pensionMonthly >= monthlyLife) return pensionStartAge;
      if (!pen.enabled && (d.currentPortfolio || 0) * (withdrawalRate / 100) / 12 >= monthlyLife) return profile.age;
      return pensionNotYetActive ? pensionStartAge : profile.age;
    }
    const series = d.seriesPlan || [];
    for (let i = 0; i < series.length; i++) {
      if ((series[i].portfolio || 0) >= fiTarget) {
        return profile.age + i / 12;
      }
    }
    return null;
  }, [d.seriesPlan, fiTarget, profile.age, pensionActive, pensionNotYetActive, pensionStartAge, pensionMonthly, monthlyLife, pen.enabled, d.currentPortfolio, withdrawalRate]);

  const yearsToFI = ageAtFI != null ? Math.max(0, ageAtFI - profile.age) : null;
  const reachedFI = ageAtFI != null && ageAtFI <= profile.age;

  // Health zone
  const zone = rate >= 0.25 ? { l: 'Excelente', color: T.green, msg: 'Aceleras con holgura.' }
            : rate >= 0.15 ? { l: 'Saludable', color: T.green, msg: 'Buen ritmo de inversión.' }
            : rate >= 0.10 ? { l: 'Aceptable', color: T.amber, msg: 'Puedes apretar un poco.' }
            : rate > 0      ? { l: 'Bajo', color: T.red, msg: 'Sube si tu situación lo permite.' }
            : { l: 'Sin datos', color: T.muted, msg: 'Define tu ingreso e inversión.' };

  if (income === 0) return null;

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, flexWrap: 'wrap', marginBottom: 14 }}>
        <Label>Tu salud financiera</Label>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: T.mono, fontSize: 10, color: zone.color, letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 600 }}>
          <span style={{ width: 8, height: 8, borderRadius: 999, background: zone.color }} />
          {zone.l}
        </div>
      </div>

      {/* Three pieces of insight */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 14 }}>

        {/* Passive income from existing capital */}
        <div style={{ padding: '12px 14px', background: T.panel, borderRadius: 10, border: '1px solid ' + T.line }}>
          <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>
            Tu dinero ya trabaja
          </div>
          <div style={{ fontFamily: T.display, fontSize: 28, color: T.green, letterSpacing: '-0.01em' }}>
            {fmtEur(passiveMonthly)}<span style={{ fontSize: 13, color: T.muted, fontFamily: T.display }}>/mes</span>
          </div>
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginTop: 4, lineHeight: 1.4 }}>
            {passiveMonthly < 5
              ? <>al ritmo actual genera muy poco. Tienes que llegar a un patrimonio que te haga trabajar para ti.</>
              : <>de tu patrimonio actual al {(plan.annualReturn || 0)}% anual{passiveCovers > 0.05 && <> · cubre el <strong style={{ color: T.green, fontStyle: 'normal' }}>{Math.round(passiveCovers * 100)}%</strong> de tu vida</>}.</>
            }
          </div>
        </div>

        {/* Years to Financial Independence */}
        <div style={{ padding: '12px 14px', background: T.panel, borderRadius: 10, border: '1px solid ' + T.line }}>
          <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>
            <Concept id="libertad-financiera">Libertad financiera</Concept>
          </div>
          {ageAtFI != null ? (
            <>
              <div style={{ fontFamily: T.display, fontSize: 28, color: T.accent, letterSpacing: '-0.01em' }}>
                {reachedFI ? '¡Ya!' : <>A los {Math.round(ageAtFI)}</>}
              </div>
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginTop: 4, lineHeight: 1.4 }}>
                {reachedFI ? (
                  pensionActive && pensionMonthly >= monthlyLife
                    ? <>la pensión pública cubre tu coste de vida actual desde los {pensionStartAge}.</>
                    : <>tu patrimonio cubre tu vida actual al {withdrawalRate}% de retiro seguro.</>
                ) : (
                  <>
                    faltan <strong style={{ color: T.ink, fontStyle: 'normal' }}>{Math.round(yearsToFI)} años</strong>. Necesitas {fmtEur(fiTarget)} para cubrir {fmtEur(monthlyGap)}/mes con la regla del {withdrawalRate}%
                    {pen.enabled && pensionNotYetActive && <>. Pensión pública desde los {pensionStartAge}: reducirá la meta {fmtEur(pensionMonthly)}/mes</>}
                    {pensionActive && pensionMonthly > 0 && <> (pensión pone {fmtEur(pensionMonthly)}/mes)</>}.
                  </>
                )}
              </div>
            </>
          ) : (
            <>
              <div style={{ fontFamily: T.display, fontSize: 24, color: T.muted, letterSpacing: '-0.01em', lineHeight: 1.1 }}>
                Fuera de horizonte
              </div>
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginTop: 4, lineHeight: 1.4 }}>
                Tu plan no llega a {fmtEur(fiTarget)} antes de la jubilación. Sube la inversión o ajusta tu coste de vida.
              </div>
            </>
          )}
        </div>
      </div>

      {/* Zone explainer */}
      <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginTop: 12, lineHeight: 1.5 }}>
        Inviertes el <strong style={{ color: zone.color, fontStyle: 'normal' }}>{Math.round(rate * 100)}%</strong> de tu ingreso. {zone.msg}
      </div>

      {pensionNotYetActive && (
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12, color: T.muted, marginTop: 8, lineHeight: 1.5, paddingTop: 10, borderTop: '1px dashed ' + T.lineSoft }}>
          Pensión pública activada. Empezará a contar desde los <strong style={{ color: T.ink, fontStyle: 'normal' }}>{pensionStartAge}</strong> años. No suma a tu ingreso actual.
        </div>
      )}
    </Card>
  );
}

// Tiered, non-restrictive friction for savings rate (% of income).
// Educational signal, not a hard cap. Used in onboarding step "¿cuánto puedes guardar?".
function getSavingsTier(pct) {
  if (pct < 10) return {
    label: 'Por debajo de la media',
    color: T.muted,
    message: 'La media española ronda el 10-12% del ingreso disponible. Por debajo, el interés compuesto se queda corto para metas a largo plazo.',
  };
  if (pct < 20) return {
    label: 'Saludable',
    color: T.green,
    message: 'En el rango sostenible para la mayoría de perfiles. Es donde están los planes FIRE en construcción.',
  };
  if (pct < 35) return {
    label: 'Alto',
    color: T.green,
    message: 'Por encima de la media española. Requiere estilo de vida ajustado y/o ingresos altos. Sostenible si la situación material lo permite.',
  };
  if (pct < 50) return {
    label: 'Muy alto',
    color: T.amber,
    message: 'Solo realista en circunstancias específicas: sin hijos, sin hipoteca, ingresos altos, o vida muy austera. Asegúrate de que es lo que aportas en tu peor mes, no en tu mejor mes.',
  };
  if (pct < 70) return {
    label: 'Excepcional',
    color: T.amber,
    message: 'Posible para perfiles muy concretos: convive sin gastos de vivienda, doble ingreso pleno, ingresos altos con vida muy contenida. Un plan basado en lo que aportas en tu mejor mes fracasa siempre. Un plan basado en lo que aportas en tu peor mes funciona.',
  };
  return {
    label: 'Improbable a largo plazo',
    color: T.red,
    message: 'Sostener 70%+ del sueldo durante años es muy raro fuera de situaciones temporales (acumulación pre-FIRE intensa, ahorro para entrada de vivienda en plazo concreto). Considera bajar a un nivel que puedas mantener cuando cambien tus circunstancias.',
  };
}

function Onboarding() {
  const { update, seedDemo } = useStore();
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    name: '',
    age: 28,
    retireAge: 60,
    capital: 1000,
    monthly: 300,
    income: 2000,
    savingType: 'percent',     // 'fixed' | 'percent' — default proportional so it grows with salary
    savingPercent: 15,         // when type=percent
    evolution: null,
    evoStep: 200,
    evoEvery: 12,
    evoCap: 5000,
    // F1.5 · Inline variable progression. null until the user picks "variable".
    variableSegments: null,
    annualReturn: 8,
    firstGoal: 'libertad',
    // v5 · "Antes de Mi Plan"
    actualLife: null,           // null when not completed, full payload when completed
  });
  // v5.11 (F1.6) · El modal ActualLifeOnboarding ya no se lanza desde el
  // onboarding inicial. Su antiguo state local se ha eliminado.

  const set = (k, v) => setData((d) => ({ ...d, [k]: v }));

  // Build a mock plan from current onboarding data so the live preview
  // reacts to income/evolution choices, not just monthly savings.
  // Hoisted above `steps` because the mirror step (8) references `livePlan`.
  const livePlan = useMemo(() => {
    const tk = todayKey();
    let incomeSegments;
    if (data.evolution === 'escalonado' && data.evoStep > 0 && data.evoCap > data.income) {
      const segs = [];
      let amount = data.income;
      let cursor = tk;
      let safety = 0;
      // Stepwise progression: build one segment per cap-step. The final
      // segment runs from the moment we'd cross `evoCap` to null (open-ended)
      // at exactly `evoCap`, so the projection actually reaches the ceiling.
      while (amount < data.evoCap && safety < 50) {
        const nextAmount = amount + data.evoStep;
        const next = addMonthsKey(cursor, data.evoEvery);
        if (nextAmount >= data.evoCap) {
          // Last partial step before the cap: shorten its duration
          // proportionally to the fraction of the step left.
          const fractionMonths = Math.max(1, Math.round((data.evoCap - amount) / data.evoStep * data.evoEvery));
          const shortEnd = addMonthsKey(cursor, fractionMonths);
          segs.push({ id: 'l' + safety, from: cursor, to: addMonthsKey(shortEnd, -1), amount, label: 'S' });
          segs.push({ id: 'l' + (safety + 1), from: shortEnd, to: null, amount: data.evoCap, label: 'S' });
          break;
        }
        segs.push({ id: 'l' + safety, from: cursor, to: addMonthsKey(next, -1), amount, label: 'S' });
        cursor = next; amount = nextAmount; safety++;
      }
      if (segs.length === 0) segs.push({ id: 'l0', from: tk, to: null, amount: data.income, label: 'S' });
      incomeSegments = segs;
    } else if (data.evolution === 'variable' && data.variableSegments && data.variableSegments.length > 0) {
      // F1.5 · Inline-defined tramos for the "variable" path.
      const segs = data.variableSegments.slice(0, 4).map((s, i, arr) => {
        const from = addMonthsKey(tk, s.fromMonth || 0);
        const next = arr[i + 1];
        const to = next ? addMonthsKey(tk, (next.fromMonth || 0) - 1) : null;
        return { id: 'lv' + i, from, to, amount: s.amount, label: 'S' };
      });
      incomeSegments = segs.length ? segs : [{ id: 'l', from: tk, to: null, amount: data.income, label: 'S' }];
    } else {
      incomeSegments = [{ id: 'l', from: tk, to: null, amount: data.income, label: 'S' }];
    }
    return {
      capital: data.capital,
      annualReturn: data.annualReturn,
      incomeSegments,
      bonusSegments: [],
      savingSegments: [
        data.savingType === 'percent'
          ? { id: 'a', from: tk, to: null, type: 'percent', value: data.savingPercent, label: 'A' }
          : { id: 'a', from: tk, to: null, type: 'fixed', value: data.monthly, label: 'A' }
      ],
      events: [],
    };
  }, [data]);
  const live = useMemo(() => projectV2(livePlan, { age: data.age, retireAge: data.retireAge }, {
    capital: data.capital,
    includeHypothetical: false,
  }), [livePlan, data.age, data.retireAge, data.capital]);
  const final = live[live.length - 1];

        const inflRate = 2.5;
        const planRet = data.annualReturn || 8;
        const piMo = Math.pow(1 + inflRate / 100, 1 / 12) - 1;

        const monthlyAporte = data.savingType === 'percent'

        let sumNominal = 0, sumReal = 0;
        let finalNominal = data.income, finalReal = data.income;
        for (let m = 1; m <= monthsToRetire; m++) {
          const nominal = computeIncomeFor(livePlan, addMonthsKey(tk, m));
          const real = nominal / Math.pow(1 + piMo, m);
          sumNominal += nominal; sumReal += real;
          if (m === monthsToRetire) { finalNominal = nominal; finalReal = real; }
        }
        const lost = sumNominal - sumReal;
        // Truth 2 values
        let parked = data.capital, invested = data.capital;
        for (let m = 1; m <= monthsToRetire; m++) {
          parked += monthlyAporte;
          invested = invested * (1 + planMo) + monthlyAporte;
        }
        const deflator = Math.pow(1 + piMo, monthsToRetire);
        const parkedReal = parked / deflator;
        const investedReal = invested / deflator;

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, marginBottom: 10 }}>
                <div>

                  <div style={{ fontFamily: T.display, fontSize: 22, color: T.faint, letterSpacing: '-0.01em' }}>{fmtEur(parkedReal)}</div>
                  <div style={{ fontFamily: T.mono, fontSize: 9, color: T.faint }}>en € sin inflación</div>
                </div>
                <div>
                  <div style={{ fontFamily: T.mono, fontSize: 9, color: T.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Con Mi Plan</div>
                  <div style={{ fontFamily: T.display, fontSize: 22, color: T.accent, letterSpacing: '-0.01em' }}>{fmtEur(investedReal)}</div>
                  <div style={{ fontFamily: T.mono, fontSize: 9, color: T.faint }}>en € sin inflación</div>
                </div>
              </div>
              <div style={{ paddingTop: 10, borderTop: '1px dashed ' + T.line }}>
                <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.muted }}>Diferencia</div>
                <div style={{ fontFamily: T.display, fontSize: 'clamp(28px, 5vw, 40px)', color: T.accent, letterSpacing: '-0.02em', lineHeight: 1.1, marginTop: 2 }}>{fmtEur(diff)}</div>
                <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 6, lineHeight: 1.5 }}>
                  Es lo que te separa de la realidad si no hicieras nada. Matemática del interés compuesto durante {yrs} años.
                </div>

            {/* F1.6 · Detailed data (expenses/mortgage/allocation) moves out of the
                initial onboarding. Pro entry point lives now in Mi Plan → Sin Mi Plan

            <div style={{ padding: 14, background: T.bg, border: '1px dashed ' + T.line, borderRadius: 12 }}>
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, lineHeight: 1.55 }}>
                Más adelante, dentro de Mi Plan, podrás abrir el bloque "¿Y si no tuviera plan?" y, desde allí, profundizar con tus gastos reales, hipoteca y dónde está tu dinero hoy.
              </div>
            </div>
          </div>
        );
      })(),
      canNext: true,

    {
      title: 'Esto es lo que Mi Plan FIRE va a hacer contigo',
      sub: 'Antes de soltarte al panel: una pieza muy corta sobre qué es y qué no es esta herramienta.',

        <div style={{ display: 'flex', flexDirection: 'column', gap: 18, fontFamily: T.serif, fontSize: 16, lineHeight: 1.6, color: T.ink, maxWidth: 620 }}>
          <p style={{ margin: 0 }}>
            Mi Plan FIRE <strong style={{ fontStyle: 'normal' }}>no te va a decir qué comprar</strong>. No te va a recomendar productos. No es asesoramiento financiero. Es una herramienta de <em>proyección y exploración</em> para que entiendas cuánto patrimonio puedes construir y qué decisiones cambian más esas cifras.

      canNext: true,

  const isLast = step === steps.length - 1;
  const s = steps[step];

  const finish = () => {
    const tk = todayKey();
    // Build income segments based on evolution choice
    let incomeSegments;
    if (data.evolution === 'escalonado' && data.evoStep > 0 && data.evoCap > data.income) {
      // Stepwise progression. Mirror of livePlan: build one segment per cap-step,
      // and on the last partial step before reaching evoCap, shorten the duration
      // proportionally and add a final open-ended segment at evoCap so the cap is
      // actually reached.
      const segs = [];
      let amount = data.income;
      let cursor = tk;
      let safety = 0;
      while (amount < data.evoCap && safety < 50) {
        const nextAmount = amount + data.evoStep;
        const next = addMonthsKey(cursor, data.evoEvery);
        if (nextAmount >= data.evoCap) {
          const fractionMonths = Math.max(1, Math.round((data.evoCap - amount) / data.evoStep * data.evoEvery));
          const shortEnd = addMonthsKey(cursor, fractionMonths);
          segs.push({ id: uid(), from: cursor, to: addMonthsKey(shortEnd, -1), amount, label: 'Salario' });
          segs.push({ id: uid(), from: shortEnd, to: null, amount: data.evoCap, label: 'Salario' });
          break;
        }
        segs.push({ id: uid(), from: cursor, to: addMonthsKey(next, -1), amount, label: 'Salario' });
        cursor = next;
        amount = nextAmount;
        safety++;
      }
      if (segs.length === 0) segs.push({ id: uid(), from: tk, to: null, amount: data.income, label: 'Salario' });
      incomeSegments = segs;
    } else if (data.evolution === 'variable' && data.variableSegments && data.variableSegments.length > 0) {
      // F1.5 · Persist the inline-defined variable tramos.
      const segs = data.variableSegments.slice(0, 4).map((s, i, arr) => {
        const from = addMonthsKey(tk, s.fromMonth || 0);
        const next = arr[i + 1];
        const to = next ? addMonthsKey(tk, (next.fromMonth || 0) - 1) : null;
        return { id: uid(), from, to, amount: s.amount, label: 'Salario' };
      });
      incomeSegments = segs.length ? segs : [{ id: uid(), from: tk, to: null, amount: data.income, label: 'Salario' }];
    } else {
      // estable / default → single open tramo
      incomeSegments = [{ id: uid(), from: tk, to: null, amount: data.income, label: 'Salario' }];
    }

    // Preserve actualLife if the user filled in the secondary mini-onboarding.
    const actualLifePayload = data.actualLife && data.actualLife.completed ? data.actualLife : {
      completed: false,
      expenses: { housing: 0, food: 0, transport: 0, subscriptions: 0, other: 0 },
      mortgage: {
        enabled: false, originalAmount: 0, termYears: 30, startYear: new Date().getFullYear(),
        type: 'fixed', fixedRate: 3.0, spread: 1.0, euriborRef: 3.0,
      },
      allocation: {
        cash: 0, deposits: 0, fundsEtfs: 0, pensionPlan: 0, other: 0,
        customReturns: { deposits: 2.0, fundsEtfs: null, pensionPlan: null, other: 0 },
      },
    };
    update({
      schemaVersion: 2,
      landingSeen: true,
      onboardingComplete: true,
      profile: { name: data.name, age: data.age, retireAge: data.retireAge },
      plan: {
        capital: data.capital,
        annualReturn: data.annualReturn,
        inflationRate: 2.5,
        withdrawalRate: 4.0,
        lifeExpectancy: 90,
        publicPension: {
          enabled: false, startAge: 67, monthlyAmount: 0, yearsContributed: 0, autoEstimate: true,
        },
        actualLife: actualLifePayload,
        monthlyPlanned: data.savingType === 'percent' ? Math.round((data.income || 0) * data.savingPercent / 100) : data.monthly,
        incomeSegments,
        bonusSegments: [],
        savingSegments: [
          data.savingType === 'percent'
            ? { id: uid(), from: tk, to: null, type: 'percent', value: data.savingPercent, label: 'Aporte ' + data.savingPercent + '% del ingreso' }
            : { id: uid(), from: tk, to: null, type: 'fixed', value: data.monthly, label: 'Aporte mensual' }
        ],
        events: [],
      },
      sandbox: null,
      months: seedMonths(data.savingType === 'percent' ? Math.round((data.income || 0) * data.savingPercent / 100) : data.monthly),
      goals: defaultGoals(data),
      activeTab: 'hoy',
    });
  };

  const mobile = useIsMobile();
  return (
    <div style={{ width: '100vw', height: '100vh', background: T.bg, fontFamily: T.serif, color: T.ink, display: 'grid', gridTemplateColumns: mobile ? '1fr' : '1.05fr 1fr', overflow: 'hidden' }}>
      {/* Left: conversation */}
      <div style={{ padding: mobile ? '32px 24px' : '64px 80px', display: 'flex', flexDirection: 'column', gap: 28, overflowY: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontFamily: T.display, fontSize: 26, letterSpacing: '-0.01em' }}>
            Mi <em style={{ color: T.accent }}>Plan</em>
          </div>
          <button onClick={() => seedDemo()}
            style={{
              fontFamily: T.mono, fontSize: 10, color: T.muted, background: 'transparent',
              border: 'none', cursor: 'pointer', letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>Saltar · usar demo</button>
        </div>

        <div style={{ display: 'flex', gap: 4 }}>
          {steps.map((_, i) => (
            <div key={i} style={{ flex: 1, height: 3, background: i <= step ? T.accent : T.line, borderRadius: 2, transition: 'background 0.3s' }} />
          ))}
        </div>

        <Label>Paso {step + 1} de {steps.length}</Label>

        <div style={{ fontFamily: T.display, fontSize: mobile ? 36 : 56, lineHeight: 1.1, letterSpacing: '-0.02em', textWrap: 'pretty' }}>
          {s.title}
        </div>
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 17, lineHeight: 1.5, maxWidth: 480 }}>
          {s.sub}
        </div>

        <div style={{ marginTop: 12 }}>{s.input}</div>

        <div style={{ marginTop: 'auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 24 }}>
          <button onClick={() => setStep((p) => Math.max(0, p - 1))} disabled={step === 0}
            style={{
              fontFamily: T.mono, fontSize: 11, padding: '12px 0', background: 'transparent',
              border: 'none', color: step === 0 ? T.line : T.muted,
              cursor: step === 0 ? 'default' : 'pointer', letterSpacing: '0.14em', textTransform: 'uppercase',
            }}>← Atrás</button>
          {isLast ? (
            <Btn variant="accent" size="lg" onClick={() => {
              // Force any focused EditableNumber to commit its draft before saving.
              if (typeof document !== 'undefined' && document.activeElement && document.activeElement.blur) {
                document.activeElement.blur();
              }
              finish();
            }}>Ver mi plan →</Btn>
          ) : (
            <Btn variant="primary" size="lg" onClick={() => {
              if (typeof document !== 'undefined' && document.activeElement && document.activeElement.blur) {
                document.activeElement.blur();
              }
              if (s.canNext) setStep((p) => p + 1);
            }} style={{ opacity: s.canNext ? 1 : 0.4 }}>Siguiente →</Btn>
          )}
        </div>
      </div>

      {/* Right: live preview */}
      {!mobile && <div style={{ background: T.panel, borderLeft: '1px solid ' + T.line, padding: '64px 60px', display: 'flex', flexDirection: 'column', gap: 22, overflow: 'hidden' }}>

        <div style={{ fontFamily: T.display, fontSize: 96, color: T.accent, lineHeight: 0.95, letterSpacing: '-0.03em' }}>

function seedMonths(monthlyPlanned) {
  const now = new Date();
  const arr = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    arr.push({
      key: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`,
      label: d.toLocaleDateString('es-ES', { month: 'short', year: 'numeric' }),
      year: d.getFullYear(), monthIndex: d.getMonth(),
      planned: monthlyPlanned, actual: null, note: '',
    });
  }
  return arr;
}

// v5.9 · Next-step rule engine for ScreenHoy's "Movimiento 3".
// Returns the first rule whose condition is met. Each rule provides title,
// editorial body, optional CTA label and the tab the CTA navigates to.
function computeNextStep(state, d) {
  const { plan, goals, profile } = state;
  const tk = todayKey();
  const income = computeIncomeFor(plan, tk);
  const planAporte = computePlannedFor(plan, tk);
  const al = plan.actualLife || { completed: false };
  const monthlyLife = al.completed
    ? sumExpenses(al)
    : Math.max(0, income - planAporte);
  const yearsToRetire = Math.max(1, profile.retireAge - profile.age);

  // Rule 1 · No liquidity cushion (no hito named like "emergencia"/"liquidez"/"colchón")
  const hasLiquidityGoal = (goals || []).some(g => /(emergencia|liquidez|colchón|colchon)/i.test(g.name || ''));
  if (!hasLiquidityGoal) {
    const low = Math.round(monthlyLife * 3);
    const high = Math.round(monthlyLife * 6);
    return {
      ruleId: 'liquidity',
      title: 'Asegura tu colchón de liquidez',
      body: monthlyLife > 0
        ? `Antes de optimizar tu allocation o aportar más, asegura un colchón de liquidez de 3-6 meses de gastos (entre ${fmtEur(low)} y ${fmtEur(high)} en tu caso). Es lo que te permite afrontar imprevistos sin tener que vender inversiones en mal momento.`
        : 'Antes de optimizar tu allocation o aportar más, asegura un colchón de liquidez de 3-6 meses de gastos. Es lo que te permite afrontar imprevistos sin tener que vender inversiones en mal momento.',
      ctaLabel: 'Aprende sobre fondo de emergencia →',
      ctaTab: 'aprender',
    };
  }
  // Rule 2 · No consistent monthly contributions
  if (planAporte <= 0) {
    return {
      ruleId: 'dca',
      title: 'Establece un aporte mensual',
      body: 'Define un aporte mensual automático a tu inversión. El DCA (aportar lo mismo cada mes independientemente de cómo vaya el mercado) reduce el impacto del momento de entrar.',
      ctaLabel: 'Aprende sobre DCA →',
      ctaTab: 'aprender',
    };
  }
  // Rule 3 · Saving rate < 15%
  const savingRate = income > 0 ? planAporte / income : 0;
  if (savingRate < 0.15) {
    return {
      ruleId: 'saving-rate',
      title: 'Sube tu tasa de ahorro',
      body: `Tu tasa de ahorro actual es del ${Math.round(savingRate * 100)}% (ahorro sobre neto). Cada punto porcentual extra de ahorro acelera tu camino a FIRE en aproximadamente 1-2 años. Considera revisar tus gastos en Seguimiento.`,
      ctaLabel: 'Aprende sobre la regla de ahorro →',
      ctaTab: 'aprender',
    };
  }
  // Rule 4 · Conservative allocation (RV < 30%) with long horizon (>15 yrs)
  if (al.completed && yearsToRetire > 15) {
    const a = al.allocation || {};
    const rv = (a.fundsEtfs || 0) + (a.pensionPlan || 0);
    if (rv < 30) {
      return {
        ruleId: 'allocation',
        title: 'Tu allocation es muy conservadora para tu horizonte',
        body: `Tu horizonte es de ${yearsToRetire} años. Tu allocation actual tiene solo un ${rv}% en renta variable. Históricamente, en plazos largos, una mayor exposición a renta variable ha dado mejor resultado, aunque con más volatilidad.`,
        ctaLabel: 'Aprende sobre asset allocation →',
        ctaTab: 'aprender',
      };
    }
  }
  // Rule 5 · Everything basic looks healthy
  return {
    ruleId: 'fiscal',
    title: 'Tu plan es robusto en sus parámetros básicos',
    body: 'El siguiente paso sería profundizar en optimización fiscal: aprovechar deducciones, planes de pensiones del cónyuge, compensación de pérdidas y ganancias.',
    ctaLabel: 'Próximamente en v1.x: revisión fiscal España 2026.',
    ctaTab: null,
  };
}

          <button key={v} onClick={() => setBump(v)}
            style={{
              fontFamily: T.mono, fontSize: 11, padding: '6px 12px',
              background: bump === v ? T.ink : 'transparent',
              color: bump === v ? T.bg : T.muted,
              border: '1px solid ' + (bump === v ? T.ink : T.line),
              borderRadius: 999, cursor: 'pointer',
            }}>+{v}€</button>
        ))}
      </div>
      <button onClick={() => mutatePlan(p => {
          const tk = todayKey();
          const segs = p.savingSegments && p.savingSegments.length ? p.savingSegments : [{ id: uid(), from: tk, to: null, type: 'fixed', value: 0, label: 'Aporte' }];
          const idx = segs.findIndex(s => isKeyInSegment(tk, s));
          if (idx < 0) {
            // No active segment → add a new fixed extra one
            return { ...p, savingSegments: [...segs, { id: uid(), from: tk, to: null, type: 'fixed', value: bump, label: 'Extra' }] };
          }
          // For fixed segments, just bump the value (preserves intent)
          // For percent segments, add a NEW fixed segment on top instead of destroying %
          const s = segs[idx];
          if (s.type === 'fixed') {
            const updated = segs.map((seg, i) => i === idx ? { ...seg, value: (Number(seg.value) || 0) + bump } : seg);
            return { ...p, savingSegments: updated };
          } else {
            return { ...p, savingSegments: [...segs, { id: uid(), from: tk, to: null, type: 'fixed', value: bump, label: 'Extra sobre ' + (s.label || 'aporte') }] };
          }
        })}
        style={{
          marginTop: 14, fontFamily: T.mono, fontSize: 10, color: T.accent,
          background: 'transparent', border: 'none', cursor: 'pointer', padding: 0,
          letterSpacing: '0.12em', textTransform: 'uppercase',
        }}>Aplicar al plan →</button>
    </Card>
  );
}

function NextGoalCard({ goals, d, goTo }) {
  const next = useMemo(() => {
    let candidate = null;
    const series = d.seriesPlan || [];
    for (const g of goals) {
      // Find earliest month the plan curve hits the goal target
      let found = null;
      for (let i = 0; i < series.length; i++) {
        if (series[i].portfolio >= g.target) {
          found = { age: series[i].age, months: i };
          break;
        }
      }
      if (found && found.months > 0) {
        if (!candidate || found.months < candidate.tg.months) candidate = { g, tg: found };
      }
    }
    return candidate;
  }, [goals, d.seriesPlan]);
  if (!next) return (
    <Card>
      <Label>Próximo hito</Label>
      <div style={{ marginTop: 14, fontFamily: T.serif, color: T.muted, fontStyle: 'italic' }}>Define tus metas para ver el próximo hito.</div>
      <div style={{ marginTop: 14 }}><Btn variant="ghost" size="sm" onClick={() => goTo('plan')}>Añadir meta</Btn></div>
    </Card>
  );
  const yrs = next.tg.months / 12;
  return (
    <Card>
      <Label>Próximo hito</Label>
      <div style={{ fontFamily: T.display, fontSize: 26, marginTop: 6, letterSpacing: '-0.01em' }}>{next.g.name}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 8 }}>
        <span style={{ fontFamily: T.display, fontSize: 36, color: T.accent, letterSpacing: '-0.02em', lineHeight: 1 }}>{fmtEur(next.g.target)}</span>
      </div>
      <div style={{ fontFamily: T.serif, color: T.muted, fontSize: 13, marginTop: 6 }}>
        Llegarías en <strong style={{ color: T.ink }}>~{yrs.toFixed(1)} años</strong> (a los {Math.round(next.tg.age)}).
      </div>
      <div style={{ marginTop: 14, height: 8, background: T.line, borderRadius: 999, overflow: 'hidden' }}>
        <div style={{ width: `${Math.min(100, d.currentPortfolio / next.g.target * 100)}%`, height: '100%', background: T.accent, borderRadius: 999 }} />
      </div>
      <div style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, marginTop: 4, letterSpacing: '0.1em' }}>
        {Math.round(d.currentPortfolio / next.g.target * 100)}% conseguido
      </div>
    </Card>
  );
}

// ─────────────────────────────────────────────────────────────
// MES A MES — tracker with always-visible projection impact
// ─────────────────────────────────────────────────────────────
function ScreenMesAMes() {
  const { state, setMonth, update } = useStore();
  const d = useDerived();
  const { months } = state;

  // Group by year — chronological ascending (oldest first, future last)
  const grouped = useMemo(() => {
    const map = {};
    months.forEach((m) => { (map[m.year] ||= []).push(m); });
    return Object.entries(map)
      .sort(([a], [b]) => +a - +b)
      .map(([year, ms]) => [year, [...ms].sort((a, b) => a.monthIndex - b.monthIndex)]);
  }, [months]);

  const filled = months.filter((m) => m.actual != null);
  const totalActual = filled.reduce((s, m) => s + m.actual, 0);
  // Use the planned that was active per the CURRENT tramos at the month's date.
  // This way changes in Ajustes reflect everywhere consistently.
  const totalPlanned = filled.reduce((s, m) => s + computePlannedFor(state.plan, m.key), 0);
  const diff = totalActual - totalPlanned;

  const addMonths = (n) => {
    update((s) => {
      const existing = new Set(s.months.map(m => m.key));
      const sorted = [...s.months].sort((a,b) => a.key > b.key ? 1 : -1);
      const last = sorted.length ? sorted[sorted.length - 1] : null;
      const base = last ? new Date(last.year, last.monthIndex + 1, 1) : new Date();
      const toAdd = [];
      for (let i = 0; i < n; i++) {
        const dt = new Date(base.getFullYear(), base.getMonth() + i, 1);
        const key = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        if (!existing.has(key)) {
          toAdd.push({
            key,
            label: dt.toLocaleDateString('es-ES', { month: 'short', year: 'numeric' }),
            year: dt.getFullYear(), monthIndex: dt.getMonth(),
            planned: computePlannedFor(s.plan, key), // live from current tramos
            actual: null,
            note: '',
          });
          existing.add(key);
        }
      }
      return { ...s, months: [...s.months, ...toAdd] };
    });
  };

  const now = new Date();
  const currentKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24, paddingBottom: 40 }}>
      <div>
        <Label>Mes a mes</Label>
        <div style={{ fontFamily: T.display, fontSize: 'clamp(30px, 3.4vw, 44px)', letterSpacing: '-0.02em', marginTop: 4, textWrap: 'pretty' }}>
          Llevas <em style={{ color: T.accent }}>{filled.length} {filled.length === 1 ? 'mes registrado' : 'meses registrados'}</em>.
          <span style={{ color: T.muted }}> Lo que apuntes aquí mueve la curva del futuro.</span>
        </div>
        {filled.length === 0 && (
          <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 14, marginTop: 10, lineHeight: 1.55, maxWidth: 620 }}>
            El registro mes a mes no es contabilidad. Es un recordatorio: ¿cómo fue este mes respecto a lo previsto? La precisión absoluta no importa. La <Concept id="aporte-mensual">constancia</Concept> sí. Es lo que te dice si tu plan está vivo o se ha quedado en una hoja olvidada.
          </div>
        )}
      </div>

      {/* Live comparison: aggregate stats */}
      <Card style={{ background: T.panel }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 18, alignItems: 'baseline' }}>
          <Stat label="Total real aportado" value={fmtEur(totalActual)} />
          <Stat label="Plan acumulado" value={fmtEur(totalPlanned)} muted />
          <Stat label="Diferencia" value={(diff >= 0 ? '+' : '') + fmtEur(diff)} accent={diff >= 0} bad={diff < 0} />
        </div>
      </Card>

      {/* Real vs plan projection — only when enough data */}
      {filled.length >= 3 ? (() => {
        const realAtLast = d.realPortfolioAtLastReg;
        const planAtLast = d.planPortfolioAtLastReg;
        const delta = d.realVsPlanDelta;
        const ratio = d.realVsPlanRatio;
        const inLine = ratio != null && Math.abs(ratio - 1) < 0.01;
        const ahead = !inLine && delta != null && delta > 0;
        const realColor = inLine ? T.accent : ahead ? T.green : T.red;
        const scenarios = [
          { label: 'Plan original', color: T.faint, series: d.seriesPlanFromStart, dashed: true },
          { label: 'Curva real', color: realColor, series: d.seriesRealFromStart, bold: true },
        ];
        return (
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8, gap: 10, flexWrap: 'wrap' }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <Label>Tu plan vs tu realidad</Label>
              <div style={{ fontFamily: T.display, fontSize: 22, letterSpacing: '-0.01em', marginTop: 4, lineHeight: 1.2 }}>
                {realAtLast != null && (
                  <>
                    Hoy: <span style={{ color: realColor }}>{fmtEur(realAtLast)}</span>
                    <span style={{ color: T.muted, fontSize: 14 }}> vs plan </span>
                    <span style={{ color: T.faint }}>{fmtEur(planAtLast)}</span>
                  </>
                )}
              </div>
              <div style={{ fontFamily: T.serif, fontStyle: 'italic', color: T.muted, fontSize: 13, marginTop: 6, lineHeight: 1.55 }}>
                {inLine ? (
                  <>Vas en línea con tu plan.</>
                ) : ahead ? (
                  d.ageAtFiReal != null && d.ageAtFiPlan != null && d.ageAtFiReal < d.ageAtFiPlan ? (
                    <>Vas por delante. A este ritmo, alcanzas la independencia financiera a los <strong style={{ color: T.ink, fontStyle: 'normal' }}>{d.ageAtFiReal.toFixed(1)}</strong> en lugar de los <strong style={{ color: T.ink, fontStyle: 'normal' }}>{d.ageAtFiPlan.toFixed(1)}</strong> originalmente previstos.</>
                  ) : (
                    <>Vas por delante: <strong style={{ color: T.green, fontStyle: 'normal' }}>{fmtEur(delta)}</strong> por encima del plan original a esta fecha.</>
                  )
                ) : (
                  d.ageAtFiReal != null && d.ageAtFiPlan != null && d.ageAtFiReal > d.ageAtFiPlan ? (
                    <>Vas por detrás del plan original. Si esto se mantiene, tu independencia se retrasa hasta los <strong style={{ color: T.ink, fontStyle: 'normal' }}>{d.ageAtFiReal.toFixed(1)}</strong> años.</>
                  ) : (
                    <>Vas por detrás del plan original: <strong style={{ color: T.red, fontStyle: 'normal' }}>{fmtEur(Math.abs(delta))}</strong> por debajo a esta fecha.</>
                  )
                )}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, fontFamily: T.mono, fontSize: 9, color: T.muted, letterSpacing: '0.08em', textTransform: 'uppercase', flexWrap: 'wrap' }}>
              <LegendChip color={realColor} label="Real" />
              <LegendChip color={T.faint} label="Plan" dashed />
            </div>
          </div>
          <MultiLineChart scenarios={scenarios} height={240} />
        </Card>
        );
      })() : (
        <Card style={{ borderStyle: 'dashed' }}>
          <Label>Tu plan vs tu realidad</Label>
          <div style={{ fontFamily: T.serif, fontSize: 14, color: T.muted, fontStyle: 'italic', marginTop: 8, lineHeight: 1.5 }}>
            Aún no hay suficientes datos. Registra al menos <strong style={{ color: T.ink, fontStyle: 'normal' }}>3 meses</strong> y verás aquí la curva de tu plan original comparada con la curva real reconstruida.
            <br />
            Llevas <strong style={{ color: T.accent, fontStyle: 'normal' }}>{filled.length} {filled.length === 1 ? 'mes' : 'meses'}</strong>.
          </div>
        </Card>
      )}

      {/* Month entries */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
        {grouped.map(([year, ms]) => (
          <div key={year}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 10 }}>
              <div style={{ fontFamily: T.display, fontSize: 28, color: T.muted, letterSpacing: '-0.01em' }}>{year}</div>
              <div style={{ flex: 1, height: 1, background: T.line }} />
              <Label>{ms.filter(m => m.actual != null).length} / {ms.length} registrados</Label>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {ms.map((m) => (
                <MonthRow key={m.key} month={m} isCurrent={m.key === currentKey} onChange={(patch) => setMonth(m.key, patch)} />
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingTop: 18, borderTop: '1px dashed ' + T.line, flexWrap: 'wrap' }}>
        <span style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.faint, marginRight: 4 }}>Añadir periodos</span>
        <Btn variant="ghost" size="sm" onClick={() => addMonths(6)}>+ 6 meses</Btn>
        <Btn variant="ghost" size="sm" onClick={() => addMonths(12)}>+ 1 año</Btn>
      </div>
      <div style={{ paddingTop: 14 }}>
        <div style={{ fontFamily: T.serif, fontSize: 12, color: T.muted, fontStyle: 'italic', lineHeight: 1.5 }}>
          Lo que ves en <strong style={{ color: T.ink, fontStyle: 'normal' }}>"Plan"</strong> sale en vivo de los tramos en Ajustes. No hay que regenerar nada: cualquier cambio en Ajustes se refleja aquí al instante.
        </div>
      </div>
    </div>
  );
}

  return (
    <div>
      <Label style={{ marginBottom: 6 }}>{label}</Label>
      <div style={{ fontFamily: T.display, fontSize: 36, letterSpacing: '-0.02em', lineHeight: 1, color: bad ? T.red : accent ? T.green : muted ? T.faint : T.ink }}>{value}</div>

  const seg = useMemo(() => findActiveSegment(state.plan.savingSegments, month.key), [state.plan.savingSegments, month.key]);
